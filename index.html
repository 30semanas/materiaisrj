<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduFinance · IUH</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;--border:#30363d;--accent:#2f81f7;--accent2:#1f6feb;--success:#3fb950;--warning:#d29922;--danger:#f85149;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--radius:8px;--font:'Segoe UI',system-ui,sans-serif;--shadow:0 8px 32px rgba(0,0,0,.5);--sidebar:220px}
[data-theme=light]{--bg:#f6f8fa;--bg2:#fff;--bg3:#f6f8fa;--bg4:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#afb8c1;--shadow:0 4px 16px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 11px;width:100%;font-size:13px;font-family:var(--font);transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,129,247,.15)}
button{cursor:pointer;font-family:var(--font);border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:500;transition:.15s;outline:none}
button:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(47,129,247,.08)}
.btn-ghost{background:transparent;color:var(--text2);padding:5px 8px}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 8px;font-size:11px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);white-space:nowrap}
tbody tr:hover td{background:rgba(47,129,247,.05)}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:50;transition:width .25s,min-width .25s}
#sidebar.collapsed{width:52px;min-width:52px}
.sidebar-logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;overflow:hidden;white-space:nowrap}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#6e40c9);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-weight:700;font-size:14px}.logo-sub{font-size:10px;color:var(--text3)}
#sidebar nav{padding:8px 6px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;overflow:hidden;margin-bottom:1px;user-select:none;transition:.12s;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(47,129,247,.15);color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-sep{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:10px 10px 4px}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);display:flex;gap:4px}
#sidebar.collapsed .nav-text,#sidebar.collapsed .nav-sep,#sidebar.collapsed .logo-text,#sidebar.collapsed .logo-sub{display:none}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.page-title{font-size:15px;font-weight:700;flex:1}
#topbar-actions{display:flex;gap:6px;align-items:center}
#content{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);border-radius:3px 0 0 3px}
.kpi.green::before{background:var(--success)}.kpi.red::before{background:var(--danger)}.kpi.yellow::before{background:var(--warning)}.kpi.gray::before{background:var(--text3)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel-title{font-weight:700;font-size:14px}
.panel-body{padding:16px 18px}
/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:580px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal.lg{width:820px}.modal.xl{width:1060px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-weight:700;font-size:15px}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.x-btn{background:none;color:var(--text2);font-size:18px;padding:2px 6px;border-radius:4px;border:none;cursor:pointer}.x-btn:hover{color:var(--danger);background:var(--bg3)}
/* LOADER */
#loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center}
#loader.show{display:flex}
.loader-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 40px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:13px;color:var(--text2)}
/* TOAST */
#toasts{position:fixed;bottom:18px;right:18px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 15px;min-width:260px;max-width:360px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);animation:tIn .25s ease;font-size:13px}
.toast.ok{border-left:3px solid var(--success)}.toast.err{border-left:3px solid var(--danger)}.toast.info{border-left:3px solid var(--accent)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:rgba(63,185,80,.15);color:var(--success)}.b-red{background:rgba(248,81,73,.15);color:var(--danger)}.b-yellow{background:rgba(210,153,34,.15);color:var(--warning)}.b-blue{background:rgba(47,129,247,.15);color:var(--accent)}.b-gray{background:var(--bg3);color:var(--text2)}
/* PROGRESS */
.prog-track{background:var(--bg4);border-radius:4px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog-fill.green{background:var(--success)}.prog-fill.yellow{background:var(--warning)}.prog-fill.red{background:var(--danger)}.prog-fill.blue{background:var(--accent)}
/* ESCOLA LIST */
.escola-row{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s;gap:12px}
.escola-row:hover{background:rgba(47,129,247,.05)}
.escola-row:last-child{border-bottom:none}
.escola-pin{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:2px solid var(--border)}
.escola-pin.com{border-color:var(--accent);background:rgba(47,129,247,.1)}
.escola-pin.sem{background:var(--bg3)}
.escola-info{flex:1;min-width:0}
.escola-nome{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.escola-sub{font-size:11px;color:var(--text3);margin-top:1px}
.escola-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:.15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(47,129,247,.05)}
.upload-icon{font-size:42px;margin-bottom:10px}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text2)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.tr{text-align:right}.tc{text-align:center}
.txt2{color:var(--text2)}.txt3{color:var(--text3)}
.fw7{font-weight:700}.mono{font-family:monospace}
.flex{display:flex;align-items:center}.gap4{gap:4px}.gap8{gap:8px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.f1{flex:1}.table-wrap{overflow-x:auto}
.c-ok{color:var(--success)}.c-warn{color:var(--warning)}.c-crit{color:var(--danger)}
.nf-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 30px;gap:8px;align-items:center}
#map-wrap{height:calc(100vh - 92px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
@media(max-width:700px){#sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}#sidebar.mob{transform:none}.form-row,.form-row-3{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}}
</style>
</head>

function loadLS(){
  try{
    const raw=localStorage.getItem('eduf2');
    if(!raw) return;
    const sv=JSON.parse(raw);
    if(sv.parceiros)    S.parceiros=sv.parceiros;
    if(sv.estoque)      S.estoque=sv.estoque;
    if(sv.recebimentos) S.recebimentos=sv.recebimentos;
    if(sv.transferencias) S.transferencias=sv.transferencias;
    if(sv.materiais)    S.materiais=sv.materiais;
    if(sv.planejamentos) S.planejamentos=sv.planejamentos;
    (sv.patch||[]).forEach(p=>{
      const e=S.escolas.find(x=>x.id===p.id);
      if(e){e.parceiro_id=p.parceiro_id;e.parceiro_nome=p.parceiro_nome;}
    });

// Formata moeda — regex escrito sem interpolação Python
function fmt(v){
  var n=parseFloat(v||0);
  var s=n.toFixed(2).replace('.',',');
  // separa milhar manualmente
  var parts=s.split(',');
  parts[0]=parts[0].replace(/(\d)(?=(\d{3})+$)/g,'$1.');
  return 'R$ '+parts.join(',');
}
function fmtN(v){ return parseFloat(v||0).toLocaleString('pt-BR',{maximumFractionDigits:2}); }
function fmtD(d){ return d?String(d).substring(0,10):'-'; }

function estItem(pId,mId){ return S.estoque.find(function(e){return e.parceiro_id===pId&&e.material_id===mId;})||null; }
function estQtd(pId,mId){ var e=estItem(pId,mId); return e?parseFloat(e.quantidade||0):0; }

function addEst(pId,pNome,mId,mNome,qtd,vu){
  qtd=parseFloat(qtd||0); vu=parseFloat(vu||0);
  var ex=estItem(pId,mId);
  if(ex){
    var total=parseFloat(ex.quantidade||0)+qtd;
    var vm=total>0?(parseFloat(ex.quantidade||0)*parseFloat(ex.valor_medio||0)+qtd*vu)/total:0;
    ex.quantidade=total; ex.valor_medio=vm;
  } else {
    S.estoque.push({id:uid(),parceiro_id:pId,parceiro_nome:pNome,material_id:mId,material_nome:mNome,quantidade:qtd,valor_medio:vu});
  }
  saveLS();
}

function moveEst(deId,paraId,paraNome,mId,mNome,qtd){
  var orig=estItem(deId,mId);
  if(!orig||parseFloat(orig.quantidade||0)<qtd) throw new Error('Estoque insuficiente');
  orig.quantidade=parseFloat(orig.quantidade||0)-qtd;
  addEst(paraId,paraNome,mId,mNome,qtd,parseFloat(orig.valor_medio||0));
}

function escolaStatus(e){
  if(!e.parceiro_id) return 'SEM';
  var planos=S.planejamentos.filter(function(p){return p.escola_id===e.id;});
  if(!planos.length) return 'OK';
  var crit=0,warn=0;
  planos.forEach(function(p){
    var disp=estQtd(e.parceiro_id,p.material_id);
    var prev=parseFloat(p.quantidade_prevista||0);
    var pct=prev>0?disp/prev:1;
    if(pct<0.5) crit++;
    else if(pct<1) warn++;
  });
  if(crit>0) return 'CRITICO';
  if(warn>0) return 'ATENCAO';
  return 'OK';
}

function gerarPlan(escola){
  S.planejamentos=S.planejamentos.filter(function(p){return p.escola_id!==escola.id;});
  var nAps=Math.min(Math.max((escola.kit_wifi||0)+(escola.ap_adicional||0),1),47);
  var ref=_ESC0.find(function(e){return (e.kit_wifi||0)+(e.ap_adicional||0)===nAps;})||_ESC0[0];
  if(!ref) return;
  _PLN0.filter(function(p){return p.escola_id===ref.id;}).forEach(function(rp){
    S.planejamentos.push({id:uid(),escola_id:escola.id,escola_nome:escola.nome,material_id:rp.material_id,material_nome:rp.material_nome,quantidade_prevista:rp.quantidade_prevista,quantidade_consumida:0});
  });
}

function painelEscola(eid){

  if(!e) return;
  var nAps=(e.kit_wifi||0)+(e.ap_adicional||0);

    return '<option value="'+p.id+'" '+(e.parceiro_id===p.id?'selected':'')+'>'+p.nome+'</option>';
  }).join('');

  var totalPrev=0,totalDisp=0,nCrit=0;
  var rows=planos.map(function(p){
    var mat=S.materiais.find(function(m){return m.id===p.material_id;})||{};
    var prev=parseFloat(p.quantidade_prevista||0);

    var falta=Math.max(0,prev-disp);
    var pct=prev>0?Math.min(disp/prev*100,100):100;

    totalPrev+=prev*parseFloat(mat.valor_medio||0);
    totalDisp+=disp*parseFloat(mat.valor_medio||0);

function saveMaterial(id){
  var nome=document.getElementById('fm-nome').value.trim();
  if(!nome){toast('Nome obrigatório','err');return;}
  var un=document.getElementById('fm-un').value.trim()||'UN';
  var vm=parseFloat(document.getElementById('fm-vm').value)||0;
  if(id){
    var m=S.materiais.find(function(x){return x.id===id;});
    m.nome=nome; m.unidade=un; m.valor_medio=vm;
    // Atualiza nome nos planejamentos
    S.planejamentos.filter(function(p){return p.material_id===id;}).forEach(function(p){p.material_nome=nome;});
  } else {
    S.materiais.push({id:uid(),nome:nome,unidade:un,valor_medio:vm});
  }
  saveLS(); CM(); toast('Material salvo!','ok'); renderMateriais();
}

function delMaterial(id){
  var m=S.materiais.find(function(x){return x.id===id;});
  var usoCount=S.planejamentos.filter(function(p){return p.material_id===id;}).length;
  var msg='Excluir "'+m.nome+'"?';
  if(usoCount>0) msg+=' Este material está em '+usoCount+' planejamento(s). Os planejamentos relacionados também serão removidos.';
  if(!confirm(msg)) return;
  S.materiais=S.materiais.filter(function(x){return x.id!==id;});
  S.planejamentos=S.planejamentos.filter(function(p){return p.material_id!==id;});
  saveLS(); toast('Material excluído','ok'); renderMateriais();
}

var _nfFile=null,_nfItens=[];
function onDrop(e){
  e.preventDefault();
  document.getElementById('uz').classList.remove('drag');
  var f=e.dataTransfer.files[0];
  if(f) setFile(f);
}
function onFileChg(inp){ if(inp.files[0]) setFile(inp.files[0]); }
function setFile(f){
  _nfFile=f;
  document.getElementById('nf-fname').textContent=f.name;
  document.getElementById('nf-prev').style.display='block';
}
function clearNF(){
  _nfFile=null;_nfItens=[];
  document.getElementById('nf-f').value='';
  document.getElementById('nf-prev').style.display='none';
  var res=document.getElementById('nf-res');
  if(res) res.style.display='none';
}

async function lerNF(){
  if(!_nfFile){toast('Selecione um arquivo','err');return;}
  SL('Lendo NF com IA...');
  try{
    var b64=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result.split(',')[1]);};
      r.onerror=rej;
      r.readAsDataURL(_nfFile);
    });
    var isPdf=_nfFile.type==='application/pdf';
    var mt=isPdf?'application/pdf':(_nfFile.type||'image/jpeg');
    var prompt='Você é especialista em notas fiscais brasileiras. Analise este documento e extraia TODAS as informações.\nResponda SOMENTE em JSON válido, sem markdown, sem explicação:\n{"numero_nf":null,"data_emissao":null,"fornecedor":null,"cnpj_fornecedor":null,"valor_total":0,"itens":[{"descricao":"","quantidade":0,"unidade":"UN","valor_unitario":0,"valor_total":0}]}\nSe não encontrar um campo use null. Extraia TODOS os itens.';
    var body={model:'claude-sonnet-4-6',max_tokens:4096,messages:[{role:'user',content:[
      isPdf?{type:'document',source:{type:'base64',media_type:mt,data:b64}}:{type:'image',source:{type:'base64',media_type:mt,data:b64}},
      {type:'text',text:prompt}
    ]}]};
    var res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data=await res.json();
    if(data.error) throw new Error(data.error.message||'Erro Claude API');
    var txt=(data.content&&data.content[0]?data.content[0].text:'')||'';
    var clean=txt.replace(/```json|```/g,'').trim();
    var nf=JSON.parse(clean);
    _nfItens=(nf.itens||[]).map(function(it){
      var mat=S.materiais.find(function(m){var d=(it.descricao||'').toLowerCase();return d.indexOf(m.nome.toLowerCase().split(' ')[0])>-1&&m.nome.split(' ')[0].length>3;});
      return Object.assign({},it,{material_id:mat?mat.id:'',matched:!!mat});
    });
    renderNFRes(nf);
  }catch(e){
    toast('Erro ao ler NF: '+e.message,'err');
  }finally{HL();}
}

function renderNFRes(nf){
  var pOpts=S.parceiros.map(function(p){return '<option value="'+p.id+'">'+p.nome+'</option>';}).join('');
  var mOpts='<option value="">— não mapear —</option>'+S.materiais.map(function(m){return '<option value="'+m.id+'">'+m.nome+'</option>';}).join('');

  var rows=_nfItens.map(function(it,i){
    var selOpts=mOpts.replace('value="'+it.material_id+'"','value="'+it.material_id+'" selected');
    return '<div style="background:var(--bg3);border-radius:6px;padding:10px 12px;margin-bottom:8px">'
      +'<div class="flex gap8 mb8">'
        +'<div style="font-size:12px;font-weight:600;flex:1">'+(it.descricao||'—')+'</div>'
        +(it.matched?'<span class="badge b-green">✓ match</span>':'')
        +'<button class="btn-danger btn-xs" onclick="_nfItens.splice('+i+',1);renderNFRes({numero_nf:document.getElementById(\'cn-num\').value,fornecedor:document.getElementById(\'cn-forn\').value,data_emissao:document.getElementById(\'cn-dt\').value})">✕</button>'
      +'</div>'
      +'<div class="nf-grid">'
        +'<select id="ni-m'+i+'" onchange="_nfItens['+i+'].material_id=this.value">'+selOpts+'</select>'
        +'<div><label>Qtd</label><input type="number" step="0.001" id="ni-q'+i+'" value="'+(it.quantidade||0)+'" oninput="_nfItens['+i+'].quantidade=parseFloat(this.value)||0"></div>'
        +'<div><label>Vlr Unit</label><input type="number" step="0.01" id="ni-u'+i+'" value="'+(it.valor_unitario||0)+'" oninput="_nfItens['+i+'].valor_unitario=parseFloat(this.value)||0"></div>'
        +'<div><label>Total</label><input type="number" step="0.01" id="ni-t'+i+'" value="'+(parseFloat(it.valor_total||0).toFixed(2))+'" oninput="_nfItens['+i+'].valor_total=parseFloat(this.value)||0"></div>'
        +'<div></div>'
      +'</div>'
    +'</div>';
  }).join('');

  var el=document.getElementById('nf-res');
  el.style.display='block';
  el.innerHTML='<div class="panel mt8">'
    +'<div class="panel-head"><span class="panel-title">✅ NF Lida — Revise e Confirme</span><span class="badge b-blue">'+_nfItens.length+' itens</span></div>'
    +'<div class="panel-body">'
      +'<div class="form-row-3 mb12">'
        +'<div class="form-group"><label>Nº NF</label><input id="cn-num" value="'+(nf.numero_nf||'')+'"></div>'
        +'<div class="form-group"><label>Fornecedor</label><input id="cn-forn" value="'+(nf.fornecedor||'')+'"></div>'
        +'<div class="form-group"><label>Data Emissão</label><input id="cn-dt" type="date" value="'+(nf.data_emissao||new Date().toISOString().split('T')[0])+'"></div>'
      +'</div>'
      +'<div class="form-group mb12"><label>Parceiro que receberá o material *</label>'
        +'<select id="cn-par"><option value="">— Selecione o parceiro —</option>'+pOpts+'</select>'
      +'</div>'
      +'<div class="divider"></div>'
      +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Mapeie cada item a um material do sistema:</div>'
      +'<div class="nf-grid" style="padding:0 0 4px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3)">'
        +'<span>Descrição / Material</span><span>Qtd</span><span>Vlr Unit</span><span>Total</span><span></span>'
      +'</div>'
      +rows
      +'<div class="flex gap8 mt16" style="justify-content:flex-end">'
        +'<span style="font-size:13px;font-weight:700;align-self:center">Total NF: '+fmt(nf.valor_total||_nfItens.reduce(function(s,i){return s+(i.valor_total||0);},0))+'</span>'
        +'<button class="btn-success" onclick="confirmarReceb()">✅ Confirmar Recebimento</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function confirmarReceb(){
  var parEl=document.getElementById('cn-par');
  var pId=parEl?parEl.value:'';
  if(!pId){toast('Selecione o parceiro de destino','err');return;}
  var par=S.parceiros.find(function(x){return x.id===pId;});
  var itensOk=_nfItens.filter(function(i){return i.material_id&&parseFloat(i.quantidade||0)>0;});
  if(!itensOk.length){toast('Mapeie ao menos um item a um material','err');return;}
  itensOk.forEach(function(it){
    var mat=S.materiais.find(function(m){return m.id===it.material_id;});
    addEst(pId,par?par.nome:'',it.material_id,mat?mat.nome:it.descricao,parseFloat(it.quantidade||0),parseFloat(it.valor_unitario||0));
  });
  S.recebimentos.push({id:uid(),parceiro_id:pId,parceiro_nome:par?par.nome:'',nf_numero:(document.getElementById('cn-num')?document.getElementById('cn-num').value:''),fornecedor:(document.getElementById('cn-forn')?document.getElementById('cn-forn').value:''),data:(document.getElementById('cn-dt')?document.getElementById('cn-dt').value:new Date().toISOString().split('T')[0]),itens:itensOk});
  saveLS(); clearNF(); toast(itensOk.length+' itens adicionados ao estoque de '+(par?par.nome:'')+'!','ok',5000);
  pages['recebimento']();
}

pages['mapa']=function(){
  ST('Mapa das Escolas');
  SA('');
  var escCoord=S.escolas.filter(function(e){return e.latitude&&e.longitude;});
  SC('<div id="map-wrap"></div>');
  iniciarMapa(escCoord);
};

var _map=null;
function iniciarMapa(escs){
  if(!escs.length){SC('<div class="panel"><div class="panel-body">'+empty('Nenhuma escola com coordenadas cadastradas')+'</div></div>');return;}
  if(!document.getElementById('leaflet-css')){
    var lnk=document.createElement('link');
    lnk.id='leaflet-css';lnk.rel='stylesheet';lnk.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(lnk);
  }
  function build(){
    if(_map){_map.remove();_map=null;}
    var wrap=document.getElementById('map-wrap');
    if(!wrap) return;
    _map=L.map('map-wrap').setView([-22.92,-43.4],11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(_map);
    escs.forEach(function(e){
      var s=escolaStatus(e);
      var cor=e.parceiro_id?(s==='OK'?'#3fb950':s==='ATENCAO'?'#d29922':s==='CRITICO'?'#f85149':'#2f81f7'):'#8b949e';
      var txt=e.parceiro_id?(s==='OK'?'✓':s==='CRITICO'?'!':'~'):'?';
      var svgPin='<svg width="30" height="40" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">'
        +'<path d="M15 0C6.72 0 0 6.72 0 15c0 10.29 15 25 15 25S30 25.29 30 15C30 6.72 23.28 0 15 0z" fill="'+cor+'" stroke="white" stroke-width="2"/>'
        +'<circle cx="15" cy="15" r="7" fill="white" opacity="0.95"/>'
        +'<text x="15" y="19" font-size="9" font-weight="bold" text-anchor="middle" fill="'+cor+'">'+txt+'</text>'
      +'</svg>';
      var icon=L.divIcon({html:svgPin,iconSize:[30,40],iconAnchor:[15,40],popupAnchor:[0,-40],className:''});
      var nAps=(e.kit_wifi||0)+(e.ap_adicional||0);
      var sLabel={SEM:'⚪ Sem parceiro',OK:'✅ Estoque OK',ATENCAO:'⚠️ Atenção',CRITICO:'🔴 Crítico'}[s]||s;
      var popup='<div style="min-width:230px;font-family:system-ui,sans-serif;font-size:13px">'
        +'<div style="font-weight:700;font-size:14px;margin-bottom:6px">'+e.nome+'</div>'
        +(e.endereco?'<div style="color:#666;font-size:11px;margin-bottom:8px">'+e.endereco+'</div>':'')
        +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
          +'<tr><td style="color:#666;padding:2px 0;width:80px">INEP</td><td style="font-weight:600">'+(e.codigo||'-')+'</td></tr>'
          +'<tr><td style="color:#666;padding:2px 0">APs</td><td style="font-weight:600">'+nAps+'</td></tr>'
          +'<tr><td style="color:#666;padding:2px 0">Parceiro</td><td style="font-weight:600">'+(e.parceiro_nome||'—')+'</td></tr>'
          +'<tr><td style="color:#666;padding:2px 0">Status</td><td style="font-weight:600">'+sLabel+'</td></tr>'
        +'</table>'
        +'<button onclick="window.__abrirEscola(\''+e.id+'\')" style="margin-top:10px;width:100%;padding:8px;background:#2f81f7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">📊 Ver Detalhes / Atribuir Parceiro</button>'
      +'</div>';
      L.marker([e.latitude,e.longitude],{icon:icon}).addTo(_map).bindPopup(popup,{maxWidth:280});
    });
    // Legenda
    var leg=L.control({position:'bottomright'});
    leg.onAdd=function(){
      var d=L.DomUtil.create('div');
      d.innerHTML='<div style="background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:8px;padding:10px 14px;font-size:12px;color:#e6edf3">'
        +'<div style="font-weight:700;margin-bottom:8px">Legenda</div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:12px;height:12px;border-radius:50%;background:#8b949e;display:inline-block"></span>Sem parceiro</div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:12px;height:12px;border-radius:50%;background:#3fb950;display:inline-block"></span>Estoque OK</div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:12px;height:12px;border-radius:50%;background:#d29922;display:inline-block"></span>Atenção</div>'
        +'<div style="display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:50%;background:#f85149;display:inline-block"></span>Crítico</div>'
      +'</div>';
      return d;
    };
    leg.addTo(_map);
  }
  if(window.L){ build(); }
  else{
    var s=document.createElement('script');
    s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.onload=build;
    document.head.appendChild(s);
  }
}

window.__abrirEscola=function(id){
  if(_map) _map.closePopup();
  setTimeout(function(){painelEscola(id);},120);
};

loadLS();
nav('escolas');
</script>
