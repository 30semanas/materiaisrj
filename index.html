<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduFinance · IUH · Novale</title>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111520;--bg3:#1a2030;--bg4:#242b3d;
  --border:#2a3348;--accent:#2f81f7;--accent2:#1f6feb;
  --success:#3fb950;--warning:#d29922;--danger:#f85149;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:8px;--font:'Segoe UI',system-ui,sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,.55);
  --sidebar:230px;
}
[data-theme=light]{
  --bg:#f0f2f8;--bg2:#fff;--bg3:#f6f8fa;--bg4:#eaeef2;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#afb8c1;
  --shadow:0 4px 16px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 11px;width:100%;font-size:13px;font-family:var(--font);transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,129,247,.15)}
button{cursor:pointer;font-family:var(--font);border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:500;transition:.15s;outline:none}
button:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(47,129,247,.08)}
.btn-ghost{background:transparent;color:var(--text2);padding:5px 8px}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 8px;font-size:11px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);white-space:nowrap}
tbody tr:hover td{background:rgba(47,129,247,.05)}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;z-index:50;
  transition:width .25s,min-width .25s;
}
#sidebar.collapsed{width:56px;min-width:56px}
.sidebar-logo{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  overflow:hidden;white-space:nowrap;
}
.sidebar-logo img{
  height:38px;width:auto;object-fit:contain;
  max-width:180px;display:block;
}
#sidebar nav{padding:10px 8px;flex:1}
.nav-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:10px 10px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:7px;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:500;
  overflow:hidden;margin-bottom:2px;user-select:none;
  transition:.12s;white-space:nowrap;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(47,129,247,.18);color:var(--accent);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{
  padding:12px 10px;border-top:1px solid var(--border);
  display:flex;gap:6px;align-items:center;
}
#sidebar.collapsed .nav-text,
#sidebar.collapsed .nav-sep,
#sidebar.collapsed .sidebar-logo img{display:none}
#sidebar.collapsed .sidebar-logo{justify-content:center;padding:16px 0}
#sidebar.collapsed .sidebar-logo::after{
  content:'N';color:var(--accent);font-weight:900;font-size:20px;
}

/* ── TOPBAR ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{
  height:54px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;
}
.page-title{font-size:15px;font-weight:700;flex:1}
#topbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#content{flex:1;overflow-y:auto;padding:22px}

/* ── CARDS KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);border-radius:3px 0 0 3px}
.kpi.green::before{background:var(--success)}.kpi.red::before{background:var(--danger)}.kpi.yellow::before{background:var(--warning)}.kpi.gray::before{background:var(--text3)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── PANELS ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel-title{font-weight:700;font-size:14px}
.panel-body{padding:16px 18px}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:580px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal.lg{width:860px}.modal.xl{width:1060px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-weight:700;font-size:15px}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.x-btn{background:none;color:var(--text2);font-size:18px;padding:2px 6px;border-radius:4px;border:none;cursor:pointer}.x-btn:hover{color:var(--danger);background:var(--bg3)}

/* ── LOADER ── */
#loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center}
#loader.show{display:flex}
.loader-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 40px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:13px;color:var(--text2);text-align:center;max-width:260px}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:18px;right:18px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 15px;min-width:260px;max-width:380px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);animation:tIn .25s ease;font-size:13px}
.toast.ok{border-left:3px solid var(--success)}.toast.err{border-left:3px solid var(--danger)}.toast.info{border-left:3px solid var(--accent)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

/* ── BADGES / PROGRESS ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:rgba(63,185,80,.15);color:var(--success)}.b-red{background:rgba(248,81,73,.15);color:var(--danger)}.b-yellow{background:rgba(210,153,34,.15);color:var(--warning)}.b-blue{background:rgba(47,129,247,.15);color:var(--accent)}.b-gray{background:var(--bg3);color:var(--text2)}
.prog-track{background:var(--bg4);border-radius:4px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog-fill.green{background:var(--success)}.prog-fill.yellow{background:var(--warning)}.prog-fill.red{background:var(--danger)}.prog-fill.blue{background:var(--accent)}

/* ── ESCOLA LIST ── */
.escola-row{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s;gap:12px}
.escola-row:hover{background:rgba(47,129,247,.05)}
.escola-row:last-child{border-bottom:none}
.escola-pin{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:2px solid var(--border)}
.escola-pin.com{border-color:var(--accent);background:rgba(47,129,247,.1)}.escola-pin.sem{background:var(--bg3)}
.escola-info{flex:1;min-width:0}
.escola-nome{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.escola-sub{font-size:11px;color:var(--text3);margin-top:1px}
.escola-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:.15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(47,129,247,.05)}
.upload-icon{font-size:42px;margin-bottom:10px}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:7px 12px;border-radius:6px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.15s;border:none;background:none}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── NF ── */
.nf-item-box{background:var(--bg3);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.nf-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 32px;gap:8px;align-items:center}

/* ── MISC ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text2)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.tr{text-align:right}.tc{text-align:center}
.txt2{color:var(--text2)}.txt3{color:var(--text3)}
.fw7{font-weight:700}.mono{font-family:monospace}
.flex{display:flex;align-items:center}.gap4{gap:4px}.gap8{gap:8px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.f1{flex:1}.table-wrap{overflow-x:auto}
.c-ok{color:var(--success)}.c-warn{color:var(--warning)}.c-crit{color:var(--danger)}
#map-wrap{height:calc(100vh - 92px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.search-wrap{position:relative;max-width:300px;flex:1}
.search-wrap input{padding-left:30px}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
@media(max-width:700px){
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  #sidebar.mob{transform:none}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:1fr 1fr}
}
</style>
</head>

</div>

function loadLS(){
  try{

    if(sv.estoque)       S.estoque=sv.estoque;
    if(sv.recebimentos)  S.recebimentos=sv.recebimentos;
    if(sv.transferencias)S.transferencias=sv.transferencias;
    if(sv.materiais)     S.materiais=sv.materiais;
    if(sv.planejamentos) S.planejamentos=sv.planejamentos;

      var e=S.escolas.find(function(x){return x.id===p.id;});
      if(e){e.parceiro_id=p.parceiro_id;e.parceiro_nome=p.parceiro_nome;}

}

// Formata moeda sem regex \B
function fmt(v){
  var n=Math.abs(parseFloat(v||0));
  var neg=parseFloat(v||0)<0;
  var s=n.toFixed(2);
  var parts=s.split('.');
  var intPart=parts[0];
  var dec=parts[1];
  var result='';
  var count=0;
  for(var i=intPart.length-1;i>=0;i--){
    if(count>0&&count%3===0) result='.'+result;
    result=intPart[i]+result;
    count++;
  }
  return (neg?'-':'')+'R$ '+result+','+dec;
}
function fmtN(v){return parseFloat(v||0).toLocaleString('pt-BR',{maximumFractionDigits:2});}
function fmtD(d){return d?String(d).substring(0,10):'-';}

function estItem(pId,mId){return S.estoque.find(function(e){return e.parceiro_id===pId&&e.material_id===mId;})||null;}
function estQtd(pId,mId){var e=estItem(pId,mId);return e?parseFloat(e.quantidade||0):0;}

function addEst(pId,pNome,mId,mNome,qtd,vu){
  qtd=parseFloat(qtd||0);vu=parseFloat(vu||0);
  var ex=estItem(pId,mId);
  if(ex){
    var total=parseFloat(ex.quantidade||0)+qtd;
    var vm=total>0?(parseFloat(ex.quantidade||0)*parseFloat(ex.valor_medio||0)+qtd*vu)/total:0;
    ex.quantidade=total;ex.valor_medio=vm;
  } else {
    S.estoque.push({id:uid(),parceiro_id:pId,parceiro_nome:pNome,material_id:mId,material_nome:mNome,quantidade:qtd,valor_medio:vu});
  }
  saveLS();
}

function moveEst(deId,paraId,paraNome,mId,mNome,qtd){
  var orig=estItem(deId,mId);
  if(!orig||parseFloat(orig.quantidade||0)<qtd) throw new Error('Estoque insuficiente');
  orig.quantidade=parseFloat(orig.quantidade||0)-qtd;
  addEst(paraId,paraNome,mId,mNome,qtd,parseFloat(orig.valor_medio||0));
}

function escolaStatus(e){
  if(!e.parceiro_id) return 'SEM';
  var planos=S.planejamentos.filter(function(p){return p.escola_id===e.id;});
  if(!planos.length) return 'OK';
  var crit=0,warn=0;
  planos.forEach(function(p){
    var disp=estQtd(e.parceiro_id,p.material_id);
    var prev=parseFloat(p.quantidade_prevista||0);
    var pct=prev>0?disp/prev:1;
    if(pct<0.5)crit++;else if(pct<1)warn++;
  });
  if(crit>0) return 'CRITICO';
  if(warn>0) return 'ATENCAO';
  return 'OK';
}

function saveEscola(id){
  var nome=document.getElementById('fe-n').value.trim();
  if(!nome){toast('Nome obrigatório','err');return;}
  var wf=parseInt(document.getElementById('fe-w').value||0);
  var ax=parseInt(document.getElementById('fe-a').value||0);
  var obj={nome:nome,codigo:document.getElementById('fe-i').value.trim(),
    estado:document.getElementById('fe-u').value.trim().toUpperCase(),
    cidade:document.getElementById('fe-c').value.trim(),
    endereco:document.getElementById('fe-e').value.trim(),
    latitude:parseFloat(document.getElementById('fe-la').value)||null,
    longitude:parseFloat(document.getElementById('fe-lo').value)||null,
    kit_wifi:wf,ap_adicional:ax};
  if(id){
    var ex=S.escolas.find(function(x){return x.id===id;});
    Object.assign(ex,obj);
  } else {
    obj.id=uid();obj.parceiro_id=null;obj.parceiro_nome=null;obj.status='ATIVO';
    S.escolas.push(obj);
    gerarPlan(obj);
    toast('Materiais gerados automaticamente para '+wf+ax+' APs!','info');
  }
  saveLS();CM();toast('Escola salva!','ok');pages['escolas']();
}
function gerarPlan(escola){
  S.planejamentos=S.planejamentos.filter(function(p){return p.escola_id!==escola.id;});
  var nAps=Math.min(Math.max((escola.kit_wifi||0)+(escola.ap_adicional||0),1),47);
  var ref=_ESC0.find(function(e){return (e.kit_wifi||0)+(e.ap_adicional||0)===nAps;})||_ESC0[0];
  if(!ref) return;
  _PLN0.filter(function(p){return p.escola_id===ref.id;}).forEach(function(rp){
    S.planejamentos.push({id:uid(),escola_id:escola.id,escola_nome:escola.nome,material_id:rp.material_id,material_nome:rp.material_nome,quantidade_prevista:rp.quantidade_prevista,quantidade_consumida:0});
  });
}

function painelEscola(eid){
  var e=S.escolas.find(function(x){return x.id===eid;});
  if(!e) return;
  var nAps=(e.kit_wifi||0)+(e.ap_adicional||0);
  var planos=S.planejamentos.filter(function(p){return p.escola_id===eid;});
  var st=escolaStatus(e);
  var parcOpts=S.parceiros.map(function(p){return '<option value="'+p.id+'" '+(e.parceiro_id===p.id?'selected':'')+'>'+p.nome+'</option>';}).join('');
  var totalPrev=0,totalDisp=0,nCrit=0;
  var rows=planos.map(function(p){
    var mat=S.materiais.find(function(m){return m.id===p.material_id;})||{};
    var prev=parseFloat(p.quantidade_prevista||0);
    var disp=e.parceiro_id?estQtd(e.parceiro_id,p.material_id):0;
    var falta=Math.max(0,prev-disp);
    var pct=prev>0?Math.min(disp/prev*100,100):100;
    var cor=pct>=100?'green':pct>=50?'yellow':'red';
    totalPrev+=prev*parseFloat(mat.valor_medio||0);
    totalDisp+=disp*parseFloat(mat.valor_medio||0);
    if(pct<50&&e.parceiro_id) nCrit++;
    return '<tr><td style="max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+p.material_nome+'">'+p.material_nome+'</td>'
      +'<td class="tr">'+fmtN(prev)+'</td>'

function saveMaterial(id){
  var nome=document.getElementById('fm-n').value.trim();
  if(!nome){toast('Nome obrigatório','err');return;}
  var un=document.getElementById('fm-u').value.trim()||'UN';
  var vm=parseFloat(document.getElementById('fm-v').value)||0;
  if(id){
    var m=S.materiais.find(function(x){return x.id===id;});
    m.nome=nome;m.unidade=un;m.valor_medio=vm;
    S.planejamentos.filter(function(p){return p.material_id===id;}).forEach(function(p){p.material_nome=nome;});
  } else {
    S.materiais.push({id:uid(),nome:nome,unidade:un,valor_medio:vm});
  }
  saveLS();CM();toast('Material salvo!','ok');renderMateriais();
}
function delMaterial(id){
  var m=S.materiais.find(function(x){return x.id===id;});
  var uso=S.planejamentos.filter(function(p){return p.material_id===id;}).length;
  if(!confirm('Excluir "'+m.nome+'"?'+(uso>0?' Remove também '+uso+' planejamento(s).':''))) return;
  S.materiais=S.materiais.filter(function(x){return x.id!==id;});
  S.planejamentos=S.planejamentos.filter(function(p){return p.material_id!==id;});
  saveLS();toast('Material excluído','ok');renderMateriais();
}

function updDisp(){

function execTransf(){
  var deEl=document.getElementById('tf-de'),paEl=document.getElementById('tf-pa'),maEl=document.getElementById('tf-ma');
  var deId=deEl.value,paId=paEl.value,maId=maEl.value;
  var qtd=parseFloat(document.getElementById('tf-qt').value)||0;
  if(!deId||!paId){toast('Selecione origem e destino','err');return;}
  if(deId===paId){toast('Origem e destino iguais','err');return;}
  if(!maId||qtd<=0){toast('Material e quantidade obrigatórios','err');return;}
  var pa=S.parceiros.find(function(x){return x.id===paId;});
  var ma=S.materiais.find(function(x){return x.id===maId;});
  try{moveEst(deId,paId,pa?pa.nome:'',maId,ma?ma.nome:'',qtd);saveLS();CM();toast(fmtN(qtd)+' un transferido!','ok');pages['parceiros']();}
  catch(e){toast(e.message,'err');}
}

var _estFiltParceiro='', _estFiltMat='', _estView='cards';

pages['estoque']=function(){
  ST('Estoque dos Parceiros');
  SA('<button class="btn-outline btn-sm" onclick="formAjuste()">⚙️ Ajuste Manual</button>'
    +'<button class="btn-outline btn-sm" onclick="formTransf()">🔄 Transferir</button>');
  renderEstoque();
};

function filtrarEstoquePor(parcId){
  _estFiltParceiro=parcId;
  renderEstoque();
}

function renderEstoque(){
  var parcOpts='<option value="">Todos os parceiros</option>'
    +S.parceiros.map(function(p){return '<option value="'+p.id+'" '+(_estFiltParceiro===p.id?'selected':'')+'>'+p.nome+'</option>';}).join('');
  var matOpts='<option value="">Todos os materiais</option>'
    +S.materiais.map(function(m){return '<option value="'+m.id+'" '+(_estFiltMat===m.id?'selected':'')+'>'+m.nome+'</option>';}).join('');

  // Filtra estoque
  var est=S.estoque.filter(function(e){return parseFloat(e.quantidade||0)>0;});
  if(_estFiltParceiro) est=est.filter(function(e){return e.parceiro_id===_estFiltParceiro;});
  if(_estFiltMat) est=est.filter(function(e){return e.material_id===_estFiltMat;});

  // KPIs
  var vTotal=est.reduce(function(s,e){return s+parseFloat(e.quantidade||0)*parseFloat(e.valor_medio||0);},0);
  var nParceiros=[...new Set(est.map(function(e){return e.parceiro_id;}))].length;
  var nItens=est.length;

  // Agrupa por parceiro para visão de cards
  var porParceiro={};
  est.forEach(function(e){
    if(!porParceiro[e.parceiro_id]) porParceiro[e.parceiro_id]={nome:e.parceiro_nome,itens:[]};
    porParceiro[e.parceiro_id].itens.push(e);
  });

  var cardsHtml=Object.keys(porParceiro).map(function(pId){
    var pg=porParceiro[pId];
    var vP=pg.itens.reduce(function(s,e){return s+parseFloat(e.quantidade||0)*parseFloat(e.valor_medio||0);},0);
    var escs=S.escolas.filter(function(e){return e.parceiro_id===pId;});

    // Para cada item, calcula cobertura relativa às escolas deste parceiro
    var rows=pg.itens.map(function(e){
      // Soma necessidade de todas as escolas deste parceiro para este material
      var needTotal=S.planejamentos.filter(function(p){
        return p.material_id===e.material_id&&escs.find(function(esc){return esc.id===p.escola_id;});
      }).reduce(function(s,p){return s+parseFloat(p.quantidade_prevista||0);},0);
      var disp=parseFloat(e.quantidade||0);
      var pct=needTotal>0?Math.min(disp/needTotal*100,100):100;
      var cor=pct>=100?'green':pct>=50?'yellow':'red';
      var needLabel=needTotal>0?fmtN(needTotal)+' nec.':'';
      return '<div style="margin-bottom:10px">'
        +'<div class="flex gap8" style="margin-bottom:3px">'
          +'<span style="flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+e.material_nome+'">'+e.material_nome+'</span>'
          +'<span style="font-size:12px;font-weight:700">'+fmtN(disp)+' <span class="txt3">'+e.parceiro_nome+'</span></span>'
          +(needTotal>0?'<span style="font-size:11px;color:var(--text3)">/ '+needLabel+'</span>':'')
        +'</div>'
        +'<div class="prog-track"><div class="prog-fill '+cor+'" style="width:'+pct+'%"></div></div>'
        +(pct<100&&needTotal>0?'<div style="font-size:10px;color:var(--'+( cor==='red'?'danger':'warning')+');margin-top:2px">Falta: '+fmtN(Math.max(0,needTotal-disp))+'</div>':'')
      +'</div>';
    }).join('');

    return '<div class="panel"><div class="panel-head">'
      +'<div class="flex gap8"><span class="panel-title">🤝 '+pg.nome+'</span>'
        +'<span class="chip">'+pg.itens.length+' itens</span>'
        +'<span class="chip">🏫 '+escs.length+' escola'+(escs.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<span class="fw7" style="font-size:14px">'+fmt(vP)+'</span>'
    +'</div><div class="panel-body">'+rows+'</div></div>';
  }).join('');

  // Visão tabela
  var tableRows=est.map(function(e){
    var escs=S.escolas.filter(function(esc){return esc.parceiro_id===e.parceiro_id;});
    var need=S.planejamentos.filter(function(p){
      return p.material_id===e.material_id&&escs.find(function(esc){return esc.id===p.escola_id;});
    }).reduce(function(s,p){return s+parseFloat(p.quantidade_prevista||0);},0);
    var disp=parseFloat(e.quantidade||0);
    var pct=need>0?Math.min(disp/need*100,100):100;
    var cor=pct>=100?'green':pct>=50?'yellow':'red';
    var falta=Math.max(0,need-disp);
    return '<tr>'
      +'<td>'+e.parceiro_nome+'</td>'
      +'<td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.material_nome+'</td>'
      +'<td class="tr fw7">'+fmtN(disp)+'</td>'
      +'<td class="tr">'+(need>0?fmtN(need):'-')+'</td>'
      +'<td class="tr '+(falta>0?'c-crit':'c-ok')+'">'+(falta>0?fmtN(falta):'✓')+'</td>'
      +'<td class="tr">'+fmt(parseFloat(e.valor_medio||0))+'</td>'
      +'<td class="tr">'+fmt(disp*parseFloat(e.valor_medio||0))+'</td>'
      +'<td><div class="prog-track" style="min-width:70px"><div class="prog-fill '+cor+'" style="width:'+pct+'%"></div></div></td>'
    +'</tr>';
  }).join('');

  SC('<div class="kpi-row">'
    +'<div class="kpi green"><div class="kpi-label">Valor Total Estoque</div><div class="kpi-value" style="font-size:18px">'+fmt(vTotal)+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Parceiros c/ Estoque</div><div class="kpi-value">'+nParceiros+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Itens em Estoque</div><div class="kpi-value">'+nItens+'</div></div>'
    +'</div>'

    // Filtros
    +'<div class="panel mb12"><div class="panel-body" style="padding:12px 18px">'
      +'<div class="form-row" style="margin-bottom:0;align-items:end">'
        +'<div class="form-group" style="margin-bottom:0"><label>Filtrar por Parceiro</label>'
          +'<select id="ef-p" onchange="_estFiltParceiro=this.value;renderEstoque()">'+parcOpts+'</select>'
        +'</div>'

  if(pEl&&mEl&&dp&&pEl.value&&mEl.value){
    var qtd=estQtd(pEl.value,mEl.value);
    dp.style.display='inline-flex';
    dp.textContent='Atual em estoque: '+fmtN(qtd)+' un';

function execAjuste(){
  var pEl=document.getElementById('aj-p'),mEl=document.getElementById('aj-m');
  var pId=pEl.value,mId=mEl.value;
  var qtd=parseFloat(document.getElementById('aj-q').value)||0;
  if(!pId||!mId){toast('Selecione parceiro e material','err');return;}
  if(qtd===0){toast('Quantidade não pode ser zero','err');return;}
  var pa=S.parceiros.find(function(x){return x.id===pId;});
  var ma=S.materiais.find(function(x){return x.id===mId;});
  if(qtd>0){
    addEst(pId,pa?pa.nome:'',mId,ma?ma.nome:'',qtd,parseFloat(ma?ma.valor_medio||0:0));
    toast('Adicionado '+fmtN(qtd)+' un ao estoque de '+(pa?pa.nome:''),'ok');
  } else {
    var ex=estItem(pId,mId);
    if(!ex||parseFloat(ex.quantidade||0)+qtd<0){toast('Estoque insuficiente para essa redução','err');return;}
    ex.quantidade=parseFloat(ex.quantidade||0)+qtd;
    saveLS();
    toast('Removido '+fmtN(Math.abs(qtd))+' un do estoque de '+(pa?pa.nome:''),'ok');
  }
  CM();renderEstoque();
}

var _nfFile=null,_nfItens=[];
function onDrop(e){e.preventDefault();document.getElementById('uz').classList.remove('drag');var f=e.dataTransfer.files[0];if(f)setFile(f);}
function onFileChg(inp){if(inp.files[0])setFile(inp.files[0]);}

async function lerNF(){
  if(!_nfFile){toast('Selecione um arquivo','err');return;}
  SL('Lendo NF com IA Claude...');
  try{
    // Converte arquivo para base64
    var b64=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result.split(',')[1]);};
      r.onerror=rej;
      r.readAsDataURL(_nfFile);
    });
    var isPdf=_nfFile.type==='application/pdf';
    var mt=isPdf?'application/pdf':(_nfFile.type||'image/jpeg');

    var prompt='Você é especialista em notas fiscais brasileiras. Analise este documento.\n'
      +'Responda SOMENTE com JSON válido, sem markdown, sem texto adicional:\n'
      +'{"numero_nf":null,"data_emissao":null,"fornecedor":null,"cnpj_fornecedor":null,"valor_total":0,"itens":[{"descricao":"","quantidade":0,"unidade":"UN","valor_unitario":0,"valor_total":0}]}\n'
      +'Extraia TODOS os itens da nota. Se não encontrar um campo, use null.';

    // Usa o endpoint da Anthropic API — no contexto do artifact do Claude.ai
    // o fetch para api.anthropic.com é proxied automaticamente com autenticação
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:4096,
        messages:[{role:'user',content:[
          isPdf
            ?{type:'document',source:{type:'base64',media_type:mt,data:b64}}
            :{type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    });

    if(!resp.ok){
      var errTxt=await resp.text();
      // Se deu erro de CORS/auth, tenta modo manual
      if(resp.status===0||resp.status===401||resp.status===403){
        HL();
        modoManual();
        return;
      }
      throw new Error('API retornou '+resp.status+': '+errTxt.substring(0,200));
    }

    var data=await resp.json();
    if(data.error) throw new Error(data.error.message||'Erro Claude API');
    var txt=(data.content&&data.content[0]?data.content[0].text:'')||'';
    var clean=txt.replace(/```json[\s\S]*?```/g,function(m){return m.slice(7,-3);}).replace(/```/g,'').trim();
    var nf=JSON.parse(clean);

    // Auto-match de materiais
    _nfItens=(nf.itens||[]).map(function(it){
      var desc=(it.descricao||'').toLowerCase();
      var mat=S.materiais.find(function(m){
        var parts=m.nome.toLowerCase().split(' ');
        return parts.some(function(w){return w.length>4&&desc.indexOf(w)>-1;});
      });
      return Object.assign({},it,{material_id:mat?mat.id:'',matched:!!mat});
    });
    renderNFRes(nf);
  }catch(e){
    console.error('lerNF error:',e);
    // Se for erro de rede/CORS, oferece modo manual
    if(e.message&&(e.message.indexOf('fetch')>-1||e.message.indexOf('network')>-1||e.message.indexOf('Failed')>-1)){
      HL();
      modoManual();
    } else {
      toast('Erro ao ler NF: '+e.message,'err',7000);
      HL();
    }
  }
}

function modoManual(){
  // Se a API não estiver acessível, oferece entrada manual dos dados da NF
  toast('IA indisponível — use o modo manual abaixo','info',6000);
  _nfItens=[{descricao:'',quantidade:0,unidade:'UN',valor_unitario:0,valor_total:0,material_id:'',matched:false}];

        +'<div><label style="font-size:10px">Vlr Unit</label><input type="number" step="0.01" id="ni-u'+i+'" value="'+(it.valor_unitario||0)+'" oninput="_nfItens['+i+'].valor_unitario=parseFloat(this.value)||0;_nfItens['+i+'].valor_total=_nfItens['+i+'].quantidade*_nfItens['+i+'].valor_unitario"></div>'
        +'<div><label style="font-size:10px">Total</label><input type="number" step="0.01" id="ni-t'+i+'" value="'+(parseFloat(it.valor_total||0).toFixed(2))+'" oninput="_nfItens['+i+'].valor_total=parseFloat(this.value)||0"></div>'

    +'<div class="flex gap4">'
      +'<span class="badge b-blue">'+_nfItens.length+' itens</span>'
      +'<button class="btn-outline btn-xs" onclick="addItemNF()">+ Item</button>'
    +'</div></div>'

        +'<div class="form-group"><label>Nº NF</label><input id="cn-n" value="'+(nf.numero_nf||'')+'"></div>'
        +'<div class="form-group"><label>Fornecedor</label><input id="cn-f" value="'+(nf.fornecedor||'')+'"></div>'
        +'<div class="form-group"><label>Data Emissão</label><input id="cn-d" type="date" value="'+(nf.data_emissao||new Date().toISOString().split('T')[0])+'"></div>'
      +'</div>'
      +'<div class="form-group mb12"><label>Parceiro que receberá o material *</label>'
        +'<select id="cn-p"><option value="">— Selecione o parceiro —</option>'+pOpts+'</select>'
      +'</div>'
      +'<div class="divider"></div>'
      +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Itens — mapeie cada item a um material:</div>'
      +'<div class="nf-grid" style="padding:2px 0;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:6px">'
        +'<span>Descrição / Material</span><span>Qtd</span><span>Vlr Unit</span><span>Total</span><span></span>'

        +'<span style="font-size:13px;font-weight:700;align-self:center">Total: '+fmt(totNF)+'</span>'
        +'<button class="btn-success" style="padding:9px 18px" onclick="confirmarReceb()">✅ Confirmar Recebimento</button>'
      +'</div>'
    +'</div></div>';

function addItemNF(){
  _nfItens.push({descricao:'Novo item',quantidade:0,unidade:'UN',valor_unitario:0,valor_total:0,material_id:'',matched:false});
  var nfNum=document.getElementById('cn-n')?document.getElementById('cn-n').value:'';

function confirmarReceb(){
  var pEl=document.getElementById('cn-p');

  if(!pId){toast('Selecione o parceiro de destino','err');return;}
  var par=S.parceiros.find(function(x){return x.id===pId;});
  var ok=_nfItens.filter(function(i){return i.material_id&&parseFloat(i.quantidade||0)>0;});
  if(!ok.length){toast('Mapeie ao menos um item a um material','err');return;}

    addEst(pId,par?par.nome:'',it.material_id,mat?mat.nome:it.descricao,parseFloat(it.quantidade||0),parseFloat(it.valor_unitario||0));
  });
  S.recebimentos.push({id:uid(),parceiro_id:pId,parceiro_nome:par?par.nome:'',

  }
  if(window.L){build();}
  else{var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=build;document.head.appendChild(s);}
}
window.__esc=function(id){if(_map)_map.closePopup();setTimeout(function(){painelEscola(id);},120);};

// ── INIT ───────────────────────────────────────────────────
loadLS();
nav('escolas');

// ============================================================
// SINCRONIZAÇÃO COM GOOGLE SHEETS
// ============================================================
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbzoyw0mzrGwzmVGhnxSgNeC87HjYl1r7VTAQYw9Tc-quSfv4MXrkT9IlwPvRnB2XC2YzQ/exec';
var _syncTimer = null;
var _syncPending = false;
var _sheetsOk = false;

// Chama API do Sheets
async function sheetsCall(action, body) {
  var url = SHEETS_API + '?action=' + encodeURIComponent(action);
  var resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action:action}, body||{})),
    signal: AbortSignal.timeout(30000)
  });
  var json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Erro Sheets');
  return json.data;
}

// Salva estado completo no Sheets (debounced 3s)
function scheduleSave() {
  _syncPending = true;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function(){ syncToSheets(false); }, 3000);
}

async function syncToSheets(showMsg) {
  if (!_sheetsOk) return; // não tenta se Sheets nunca respondeu
  _syncPending = false;
  var state = buildState();
  try {
    await sheetsCall('save_state', {state: state});
    if (showMsg) toast('💾 Salvo no Google Sheets!', 'ok');
    updateSyncIcon('ok');
  } catch(e) {
    if (showMsg) toast('Erro ao salvar: ' + e.message, 'err');
    updateSyncIcon('err');
  }
}

function buildState() {
  return {
    parceiros:      S.parceiros,
    estoque:        S.estoque,
    recebimentos:   S.recebimentos,
    transferencias: S.transferencias,
    materiais:      S.materiais,
    planejamentos:  S.planejamentos,
    patch:          S.escolas.map(function(e){ return {id:e.id, parceiro_id:e.parceiro_id||'', parceiro_nome:e.parceiro_nome||''}; })
  };
}

// Carrega estado do Sheets na inicialização
async function loadFromSheets() {
  try {
    // Primeiro inicializa as abas
    await sheetsCall('init', {});
    _sheetsOk = true;
    updateSyncIcon('loading');

    var data = await sheetsCall('load_state', {});

    // Aplica dados do Sheets (sobrescreve localStorage com dados do servidor)
    if (data.parceiros && data.parceiros.length > 0)
      S.parceiros = data.parceiros;

    if (data.estoque && data.estoque.length > 0)
      S.estoque = data.estoque.map(function(e){
        return Object.assign(e, {quantidade: parseFloat(e.quantidade||0), valor_medio: parseFloat(e.valor_medio||0)});
      });

    if (data.recebimentos && data.recebimentos.length > 0)
      S.recebimentos = data.recebimentos;

    if (data.transferencias && data.transferencias.length > 0)
      S.transferencias = data.transferencias;

    if (data.materiais && data.materiais.length > 0)
      S.materiais = data.materiais.map(function(m){
        return Object.assign(m, {valor_medio: parseFloat(m.valor_medio||0)});
      });

    if (data.planejamentos && data.planejamentos.length > 0)
      S.planejamentos = data.planejamentos.map(function(p){
        return Object.assign(p, {quantidade_prevista: parseFloat(p.quantidade_prevista||0), quantidade_consumida: parseFloat(p.quantidade_consumida||0)});
      });

    // Aplica patches de parceiro nas escolas
    if (data.patch && data.patch.length > 0) {
      data.patch.forEach(function(p){
        var e = S.escolas.find(function(x){ return x.id === p.id; });
        if (e) {
          e.parceiro_id   = p.parceiro_id   || null;
          e.parceiro_nome = p.parceiro_nome  || null;
        }
      });
    }

    // Atualiza localStorage com dados frescos
    saveLS();
    updateSyncIcon('ok');
    toast('☁️ Dados carregados do Google Sheets', 'info', 3000);

    // Recarrega a página atual para mostrar dados atualizados
    if (typeof pages[currentPage] === 'function') pages[currentPage]();

  } catch(e) {
    _sheetsOk = false;
    updateSyncIcon('off');
    // Silencioso — continua com localStorage
    console.warn('Sheets indisponível, usando dados locais:', e.message);
  }
}

var _currentPage = '';
function updateSyncIcon(status) {
  var el = document.getElementById('sync-icon');
  if (!el) return;
  var icons = {ok:'☁️', err:'⚠️', loading:'🔄', off:'📴'};
  var titles = {ok:'Sincronizado com Google Sheets', err:'Erro de sincronização', loading:'Sincronizando...', off:'Offline (dados locais)'};
  el.textContent = icons[status] || '☁️';
  el.title = titles[status] || '';
}

// Sobrescreve saveLS para também disparar sync
var _origSaveLS = saveLS;
saveLS = function() {
  _origSaveLS();
  scheduleSave();
};

// Botão de sync manual na sidebar-footer
var sfEl = document.querySelector('.sidebar-footer');
if (sfEl) {
  var syncBtn = document.createElement('button');
  syncBtn.className = 'btn-ghost btn-sm';
  syncBtn.id = 'sync-icon';
  syncBtn.textContent = '📴';
  syncBtn.title = 'Sincronizar com Google Sheets';
  syncBtn.onclick = function() { syncToSheets(true); };
  sfEl.insertBefore(syncBtn, sfEl.firstChild);
}

var currentPage = 'escolas';
var _origNav = nav;
nav = function(page) {
  currentPage = page;
  _origNav(page);
};

// Inicia carregamento do Sheets em background
loadFromSheets();

</script>
