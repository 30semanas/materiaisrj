<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduFinance — Controle Financeiro Escolar</title>
<style>
/* ============================================================
   TOKENS & RESET
   ============================================================ */
:root {
  --bg:        #0f1117;
  --bg2:       #161b27;
  --bg3:       #1e2535;
  --border:    #2a3348;
  --accent:    #3b82f6;
  --accent2:   #1d4ed8;
  --success:   #22c55e;
  --warning:   #f59e0b;
  --danger:    #ef4444;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #64748b;
  --sidebar-w: 240px;
  --radius:    10px;
  --font:      'Segoe UI', system-ui, sans-serif;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:     #f1f5f9;
  --bg2:    #ffffff;
  --bg3:    #e2e8f0;
  --border: #cbd5e1;
  --text:   #0f172a;
  --text2:  #475569;
  --text3:  #94a3b8;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
a { color: var(--accent); text-decoration: none; }
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 12px; width: 100%; font-size: 14px; font-family: var(--font);
  transition: border .2s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
button { cursor: pointer; font-family: var(--font); border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; transition: .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-danger:hover  { filter: brightness(1.15); }
.btn-success { background: var(--success); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
th { color: var(--text2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; background: var(--bg3); }
tr:hover td { background: var(--bg3); }
label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.form-group { margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow-y: auto; transition: .3s; z-index: 100;
}
#sidebar-logo {
  padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
#sidebar-logo .logo-icon {
  width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
#sidebar-logo .logo-text { font-weight: 700; font-size: 15px; }
#sidebar-logo .logo-sub  { font-size: 10px; color: var(--text3); }

#sidebar nav { padding: 8px; flex: 1; }
.nav-section { margin-bottom: 4px; }
.nav-section-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text3); padding: 8px 8px 4px; font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 13px;
  margin-bottom: 1px; transition: .15s; user-select: none;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(59,130,246,.15); color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

#sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#topbar {
  height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
}
#topbar .page-title { font-size: 16px; font-weight: 700; flex: 1; }
#topbar .topbar-actions { display: flex; gap: 8px; align-items: center; }

#content { flex: 1; overflow-y: auto; padding: 24px; }

/* CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent);
}
.stat-card.green::before { background: var(--success); }
.stat-card.yellow::before { background: var(--warning); }
.stat-card.red::before { background: var(--danger); }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* PANELS */
.panel {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 20px;
}
.panel-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-weight: 700; font-size: 14px; }
.panel-body { padding: 16px 20px; }

/* MODAL */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
#modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  width: 560px; max-width: 96vw; max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
}
.modal-lg { width: 820px; }
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-weight: 700; font-size: 15px; }
.modal-close { background: none; color: var(--text2); font-size: 20px; padding: 4px 8px; }
.modal-close:hover { color: var(--danger); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

/* LOADING */
#loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 9999; align-items: center; justify-content: center;
}
#loading-overlay.show { display: flex; }
.loading-box {
  background: var(--bg2); border-radius: var(--radius); padding: 24px 32px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9998; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; min-width: 260px; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow); animation: slideIn .3s ease; font-size: 13px;
}
.toast.success { border-left: 4px solid var(--success); }
.toast.error   { border-left: 4px solid var(--danger);  }
.toast.info    { border-left: 4px solid var(--accent);  }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* BADGE / STATUS */
.badge {
  display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-green  { background: rgba(34,197,94,.15);  color: var(--success); }
.badge-yellow { background: rgba(245,158,11,.15); color: var(--warning); }
.badge-red    { background: rgba(239,68,68,.15);  color: var(--danger);  }
.badge-blue   { background: rgba(59,130,246,.15); color: var(--accent);  }
.badge-gray   { background: var(--bg3); color: var(--text2); }

/* CHART */
.chart-bar-wrap { margin-top: 8px; }
.chart-bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.chart-bar-label { width: 140px; font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chart-bar-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 20px; position: relative; overflow: hidden; }
.chart-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.chart-bar-fill span { font-size: 11px; color: #fff; font-weight: 600; white-space: nowrap; }
.chart-bar-val { width: 90px; text-align: right; font-size: 12px; font-weight: 600; }

/* PROGRESS */
.progress-track { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 4px; transition: width .5s; }
.progress-fill.green  { background: var(--success); }
.progress-fill.yellow { background: var(--warning); }
.progress-fill.red    { background: var(--danger);  }

/* MISC */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-mono { font-family: monospace; }
.text-success { color: var(--success); }
.text-danger  { color: var(--danger); }
.text-warning { color: var(--warning); }
.gap-8 { display: flex; gap: 8px; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.mb-16 { margin-bottom: 16px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 15px; font-weight: 700; }
input[type="file"] { padding: 6px; }
.table-wrap { overflow-x: auto; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
#sidebar.collapsed { width: 56px; min-width: 56px; }
#sidebar.collapsed .nav-item span { display: none; }
#sidebar.collapsed .nav-section-title { display: none; }
#sidebar.collapsed .logo-text, #sidebar.collapsed .logo-sub { display: none; }

@media (max-width: 768px) {
  #sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
  #sidebar.mobile-open { transform: translateX(0); }
  #content { padding: 16px; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <span id="loading-text">Carregando...</span>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-icon">📊</div>
      <div>
        <div class="logo-text">EduFinance</div>
        <div class="logo-sub">Controle Escolar</div>
      </div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <div class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
          <span class="nav-icon">🏠</span><span>Dashboard</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Cadastros</div>
        <div class="nav-item" onclick="navigate('escolas')" data-page="escolas">
          <span class="nav-icon">🏫</span><span>Escolas</span>
        </div>
        <div class="nav-item" onclick="navigate('materiais')" data-page="materiais">
          <span class="nav-icon">📦</span><span>Materiais</span>
        </div>
        <div class="nav-item" onclick="navigate('fornecedores')" data-page="fornecedores">
          <span class="nav-icon">🏭</span><span>Fornecedores</span>
        </div>
        <div class="nav-item" onclick="navigate('parceiros')" data-page="parceiros">
          <span class="nav-icon">🤝</span><span>Parceiros</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Operações</div>
        <div class="nav-item" onclick="navigate('notas')" data-page="notas">
          <span class="nav-icon">🧾</span><span>Notas Fiscais</span>
        </div>
        <div class="nav-item" onclick="navigate('estoque')" data-page="estoque">
          <span class="nav-icon">📋</span><span>Estoque</span>
        </div>
        <div class="nav-item" onclick="navigate('transferencias')" data-page="transferencias">
          <span class="nav-icon">🔄</span><span>Transferências</span>
        </div>
        <div class="nav-item" onclick="navigate('consumo')" data-page="consumo">
          <span class="nav-icon">✅</span><span>Consumo</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Planejamento</div>
        <div class="nav-item" onclick="navigate('planejamento')" data-page="planejamento">
          <span class="nav-icon">📅</span><span>Planejamento</span>
        </div>
        <div class="nav-item" onclick="navigate('financeiro')" data-page="financeiro">
          <span class="nav-icon">💰</span><span>Financeiro</span>
        </div>
      </div>
    </nav>
    <div id="sidebar-footer">
      <span style="font-size:11px;color:var(--text3)">v1.0</span>
      <button class="btn-outline btn-sm" onclick="toggleTheme()">🌓</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button class="btn-outline btn-sm" onclick="toggleSidebar()" title="Menu">☰</button>
      <span class="page-title" id="page-title">Dashboard</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content">
      <div class="flex-center" style="height:200px;color:var(--text3)">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzoyw0mzrGwzmVGhnxSgNeC87HjYl1r7VTAQYw9Tc-quSfv4MXrkT9IlwPvRnB2XC2YzQ/exec';

// ============================================================
// API CLIENT
// ============================================================
async function apiCall(action, data = {}, method = 'POST') {
  showLoading();
  try {
    let url = API_URL + '?action=' + encodeURIComponent(action);
    let opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };

    if (method === 'GET') {
      Object.keys(data).forEach(k => { url += '&' + k + '=' + encodeURIComponent(data[k]); });
      opts.method = 'GET';
      delete opts.headers;
    } else {
      opts.body = JSON.stringify({ action, ...data });
    }

    const res = await fetch(url, opts);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Erro desconhecido');
    return json.data;
  } finally {
    hideLoading();
  }
}

async function apiGet(action, params = {}) {
  return apiCall(action, params, 'GET');
}

// ============================================================
// LOADING / TOAST / MODAL
// ============================================================
function showLoading(msg = 'Carregando...') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = (type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️') + ' ' + msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
function openModal(title, html, footer = '', large = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-footer').innerHTML = footer || '<button class="btn-outline btn-sm" onclick="closeModal()">Fechar</button>';
  document.getElementById('modal-box').className = 'modal' + (large ? ' modal-lg' : '');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ============================================================
// THEME / SIDEBAR
// ============================================================
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPage = '';
const pageHandlers = {};

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('topbar-actions').innerHTML = '';
  if (pageHandlers[page]) pageHandlers[page]();
}

// ============================================================
// UTILITIES
// ============================================================
function fmt(val) {
  return 'R$ ' + parseFloat(val || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function fmtNum(n) { return parseFloat(n || 0).toFixed(2); }
function fmtDate(d) { if (!d) return '-'; return d.substring(0, 10); }
function badge(status) {
  const m = { 'ATIVO': 'green', 'INATIVO': 'gray', 'OK': 'green', 'ATENCAO': 'yellow', 'CRITICO': 'red', 'PENDENTE': 'yellow', 'IMPORTADA': 'blue', 'APROVADA': 'green' };
  const cl = m[status] || 'gray';
  return `<span class="badge badge-${cl}">${status}</span>`;
}
function setContent(html) { document.getElementById('content').innerHTML = html; }
function setTitle(t) { document.getElementById('page-title').textContent = t; }
function addTopbarBtn(label, cls, onclick) {
  const b = document.createElement('button');
  b.className = cls + ' btn-sm';
  b.textContent = label;
  b.onclick = onclick;
  document.getElementById('topbar-actions').appendChild(b);
}

// empty state
function emptyState(msg) {
  return `<div class="empty-state"><div class="empty-icon">📭</div><p>${msg}</p></div>`;
}

// pagination
function paginationHtml(data, onPage) {
  if (!data || data.pages <= 1) return '';
  let html = `<div style="display:flex;gap:6px;justify-content:center;margin-top:16px">`;
  for (let i = 1; i <= data.pages; i++) {
    const active = i === data.page ? 'style="background:var(--accent);color:#fff"' : '';
    html += `<button class="btn-outline btn-sm" ${active} onclick="(${onPage})(${i})">${i}</button>`;
  }
  html += `</div>`;
  return html;
}

// ============================================================
// DASHBOARD
// ============================================================
pageHandlers['dashboard'] = async () => {
  setTitle('Dashboard');
  setContent(`<div class="flex-center" style="height:200px"><div class="spinner"></div></div>`);
  try {
    const d = await apiCall('financeiro.dashboard', {});
    const statusMap = { 'OK': 'green', 'ATENCAO': 'yellow', 'CRITICO': 'red' };
    
    let escolasHtml = (d.statusEscolas || []).slice(0, 8).map(e => {
      const pct = Math.min(e.percentual, 100);
      const cor = statusMap[e.status] || 'green';
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px">${e.escola_nome}</span>
          <span style="font-size:12px;color:var(--text2)">${fmt(e.gasto)} <span class="badge badge-${cor}" style="font-size:10px">${e.percentual}%</span></span>
        </div>
        <div class="progress-track"><div class="progress-fill ${cor}" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

    let barEscola = renderBarChart(d.gastoPorEscola || [], 'valor', 'nome', 'blue');
    let barMat = renderBarChart(d.gastoPorMaterial || [], 'valor', 'nome', 'green');

    setContent(`
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Gasto Total</div>
          <div class="stat-value" style="font-size:20px">${fmt(d.gastoTotal)}</div>
          <div class="stat-sub">Consumo acumulado</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Total Compras</div>

function renderBarChart(data, valKey, labelKey, color = 'blue') {
  if (!data || data.length === 0) return '';
  const max = Math.max(...data.map(d => parseFloat(d[valKey] || 0)));
  return data.map(d => {
    const pct = max > 0 ? (parseFloat(d[valKey] || 0) / max) * 100 : 0;
    return `<div class="chart-bar-item">
      <div class="chart-bar-label" title="${d[labelKey]}">${d[labelKey]}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${pct}%;background:var(--${color === 'green' ? 'success' : 'accent'})">
          ${pct > 20 ? '<span>' + fmt(d[valKey]) + '</span>' : ''}
        </div>
      </div>
      <div class="chart-bar-val">${fmt(d[valKey])}</div>
    </div>`;
  }).join('');
}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <strong style="font-size:13px">Itens da Nota</strong>
      <button class="btn-outline btn-sm" onclick="addItemNota('${mOpts.replace(/'/g,"&apos;")}')">+ Item</button>
    </div>
    <div id="itens-nota-list"><p style="color:var(--text3);font-size:12px;text-align:center;padding:16px">Clique em "+ Item" para adicionar</p></div>
    <div style="text-align:right;margin-top:8px"><strong>Total: <span id="nota-total">R$ 0,00</span></strong></div>
  `;
  const footer = `
    <button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button>
    <button class="btn-primary btn-sm" onclick="saveNota()">💾 Salvar Nota</button>`;
  openModal('Lançar Nota Fiscal', html, footer, true);
  window._notaItens = [];
}

let _notaItens = [];
function addItemNota(mOpts) {
  _notaItens = window._notaItens || [];
  const idx = _notaItens.length;
  _notaItens.push({ material_id: '', material_nome: '', quantidade: 0, valor_unitario: 0 });
  window._notaItens = _notaItens;
  renderItensNota(mOpts);
}

function renderItensNota(mOpts) {
  const list = document.getElementById('itens-nota-list');
  if (!list) return;
  if (!window._notaItens || window._notaItens.length === 0) {
    list.innerHTML = '<p style="color:var(--text3);font-size:12px;text-align:center;padding:16px">Nenhum item</p>';
    return;
  }
  list.innerHTML = window._notaItens.map((item, i) => `
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;padding:10px;background:var(--bg3);border-radius:6px">
      <div><label>Material</label>
        <select onchange="updateItemNota(${i},'material_id',this.value,this)" id="in-mat-${i}">
          <option value="">Selecione...</option>${mOpts}
        </select>
      </div>
      <div><label>Qtd</label><input type="number" step="0.001" value="${item.quantidade||0}" oninput="updateItemNota(${i},'quantidade',this.value)" id="in-qtd-${i}"></div>
      <div><label>Vlr Unit (R$)</label><input type="number" step="0.01" value="${item.valor_unitario||0}" oninput="updateItemNota(${i},'valor_unitario',this.value)" id="in-vu-${i}"></div>
      <div><button class="btn-danger btn-sm" onclick="removeItemNota(${i},'${mOpts.replace(/'/g,"&apos;")}')">✕</button></div>
    </div>`).join('');
  calcNotaTotal();
}

function updateItemNota(idx, field, val, el) {
  if (!window._notaItens) return;
  if (field === 'material_id' && el) {
    const opt = el.options[el.selectedIndex];
    window._notaItens[idx].material_nome = opt ? opt.getAttribute('data-nome') || '' : '';
  }
  window._notaItens[idx][field] = val;
  calcNotaTotal();
}

function removeItemNota(idx, mOpts) {
  window._notaItens.splice(idx, 1);
  renderItensNota(mOpts);
}

function calcNotaTotal() {
  const total = (window._notaItens || []).reduce((s, i) => s + parseFloat(i.quantidade || 0) * parseFloat(i.valor_unitario || 0), 0);
  const el = document.getElementById('nota-total');
  if (el) el.textContent = fmt(total);
}

async function saveNota() {
  const num = document.getElementById('fn-num').value.trim();
  const fornEl = document.getElementById('fn-forn');
  const fornId = fornEl.value;
  const fornNome = fornEl.options[fornEl.selectedIndex]?.getAttribute('data-nome') || '';
  const dt = document.getElementById('fn-dt').value;

  if (!num) return toast('Número da nota é obrigatório', 'error');
  if (!fornId) return toast('Fornecedor é obrigatório', 'error');

  const itens = (window._notaItens || []).map(i => ({
    material_id: i.material_id,
    material_nome: i.material_nome,
    quantidade: parseFloat(i.quantidade || 0),
    valor_unitario: parseFloat(i.valor_unitario || 0),
    valor_total: parseFloat(i.quantidade || 0) * parseFloat(i.valor_unitario || 0)
  }));
  const valorTotal = itens.reduce((s, i) => s + i.valor_total, 0);

  try {
    await apiCall('nota.create', { numero_nota: num, fornecedor_id: fornId, fornecedor_nome: fornNome, data_emissao: dt, valor_total: valorTotal, itens });
    toast('Nota lançada e estoque atualizado!', 'success');
    closeModal();
    loadNotas();
  } catch(e) { toast(e.message, 'error'); }
}

    escola_nome: escEl.options[escEl.selectedIndex]?.getAttribute('data-nome') || '',
    material_id: matEl.value,
    material_nome: matEl.options[matEl.selectedIndex]?.getAttribute('data-nome') || '',
    quantidade_prevista: parseFloat(document.getElementById('pl-qtd').value) || 0
  };
  if (!payload.escola_id) return toast('Escola é obrigatória', 'error');
  if (!payload.material_id) return toast('Material é obrigatório', 'error');
  try {
    if (id) { payload.id = id; await apiCall('planejamento.update', payload); }
    else { await apiCall('planejamento.create', payload); }
    toast('Planejamento salvo!', 'success'); closeModal(); loadPlanejamento();
  } catch(e) { toast(e.message, 'error'); }
}

async function deletePlanejamento(id) {
  if (!confirm('Excluir planejamento?')) return;
  try { await apiCall('planejamento.delete', { id }); toast('Excluído!', 'success'); loadPlanejamento(); }
  catch(e) { toast(e.message, 'error'); }
}

function formImportarPlanejamento() {
  openModal('📥 Importar Planejamento via CSV',
    `<p style="color:var(--text2);margin-bottom:12px">Cole os dados no formato CSV (uma linha por item):</p>
    <p style="font-size:11px;color:var(--text3);margin-bottom:8px">Formato: <code>escola_nome,material_nome,quantidade_prevista</code></p>
    <textarea id="imp-csv" style="height:200px;font-family:monospace;font-size:12px" placeholder="Escola ABC,Papel A4,500
Escola XYZ,Lápis HB,200"></textarea>`,
    `<button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn-primary btn-sm" onclick="importarPlanejamentoCSV()">📥 Importar</button>`);
}

async function importarPlanejamentoCSV() {
  const csv = document.getElementById('imp-csv').value.trim();
  if (!csv) return toast('Informe os dados', 'error');
  const itens = csv.split('\n').map(line => {
    const parts = line.split(',');
    return { escola_nome: (parts[0] || '').trim(), material_nome: (parts[1] || '').trim(), quantidade_prevista: parseFloat((parts[2] || '0').trim()) };
  }).filter(i => i.escola_nome && i.material_nome);
  try {
    const r = await apiCall('planejamento.importar', { itens });
    toast(`${r.importados} itens importados. ${r.erros?.length||0} erros.`, 'success');
    closeModal(); loadPlanejamento();
  } catch(e) { toast(e.message, 'error'); }
}

// ============================================================
// FINANCEIRO
// ============================================================
pageHandlers['financeiro'] = async () => {
  setTitle('Relatório Financeiro');
  await loadFinanceiro();
};

async function loadFinanceiro() {
  setContent(`<div class="flex-center" style="height:200px"><div class="spinner"></div></div>`);
  try {
    const d = await apiCall('financeiro.dashboard', {});
    const statusMap = { 'OK': 'green', 'ATENCAO': 'yellow', 'CRITICO': 'red' };
    
    const escRows = (d.statusEscolas || []).map(e => {
      const cor = statusMap[e.status] || 'green';
      const pct = Math.min(e.percentual, 100);
      return `<tr>
        <td>${e.escola_nome}</td>
        <td class="text-right">${e.previsto > 0 ? fmtNum(e.previsto) : '-'}</td>
        <td class="text-right">${fmtNum(e.consumido)}</td>
        <td class="text-right text-${cor === 'green' ? 'success' : cor === 'red' ? 'danger' : 'warning'}">${fmt(e.gasto)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="progress-track" style="flex:1"><div class="progress-fill ${cor}" style="width:${pct}%"></div></div>
            <span style="font-size:11px">${e.percentual}%</span>
          </div>
        </td>
        <td>${badge(e.status)}</td>
      </tr>`;
    }).join('');

    setContent(`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Investido</div><div class="stat-value" style="font-size:20px">${fmt(d.totalCompras)}</div></div>
        <div class="stat-card red"><div class="stat-label">Total Consumido</div><div class="stat-value" style="font-size:20px">${fmt(d.gastoTotal)}</div></div>
        <div class="stat-card green"><div class="stat-label">Em Estoque</div><div class="stat-value" style="font-size:20px">${fmt(d.valorEstoque)}</div></div>
        <div class="stat-card ${d.saldoEstoque >= 0 ? 'green' : 'red'}">
          <div class="stat-label">Saldo</div>
          <div class="stat-value" style="font-size:20px;color:${d.saldoEstoque >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(d.saldoEstoque)}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">🏫 Gasto por Escola</span></div>
          <div class="panel-body">${renderBarChart(d.gastoPorEscola || [], 'valor', 'nome') || emptyState('Sem dados')}</div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📦 Gasto por Material</span></div>
          <div class="panel-body">${renderBarChart(d.gastoPorMaterial || [], 'valor', 'nome', 'green') || emptyState('Sem dados')}</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">📊 Previsto vs Real por Escola</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Escola</th><th class="text-right">Previsto</th><th class="text-right">Consumido</th><th class="text-right">Gasto (R$)</th><th>Progresso</th><th>Status</th></tr></thead>
            <tbody>${escRows || '<tr><td colspan="6">' + emptyState('Sem dados financeiros') + '</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `);
  } catch(e) { setContent(`<p class="text-danger">${e.message}</p>`); }
}

  try {
    await apiCall('sistema.init', {});

  navigate('dashboard');

init();
