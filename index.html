<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduFinance — Controle Financeiro Escolar</title>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3348;--accent:#3b82f6;--accent2:#1d4ed8;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--sidebar-w:240px;--radius:10px;--font:'Segoe UI',system-ui,sans-serif;--shadow:0 4px 24px rgba(0,0,0,.4)}
[data-theme=light]{--bg:#f1f5f9;--bg2:#fff;--bg3:#e2e8f0;--border:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--shadow:0 4px 24px rgba(0,0,0,.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent);text-decoration:none}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;width:100%;font-size:14px;font-family:var(--font);transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
button{cursor:pointer;font-family:var(--font);border:none;border-radius:6px;padding:8px 16px;font-size:14px;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{filter:brightness(1.15)}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;background:var(--bg3)}
tr:hover td{background:var(--bg3)}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:.3s;z-index:100}
#sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#sidebar-logo .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
#sidebar-logo .logo-text{font-weight:700;font-size:15px}
#sidebar-logo .logo-sub{font-size:10px;color:var(--text3)}
#sidebar nav{padding:8px;flex:1}
.nav-section{margin-bottom:4px}
.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:8px 8px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:1px;transition:.15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--accent);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
#sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#topbar .page-title{font-size:16px;font-weight:700;flex:1}
#topbar .topbar-actions{display:flex;gap:8px;align-items:center}
#content{flex:1;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-card.green::before{background:var(--success)}.stat-card.yellow::before{background:var(--warning)}.stat-card.red::before{background:var(--danger)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-weight:700;font-size:14px}
.panel-body{padding:16px 20px}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:560px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal-lg{width:820px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-weight:700;font-size:15px}
.modal-close{background:none;color:var(--text2);font-size:20px;padding:4px 8px}.modal-close:hover{color:var(--danger)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center}
#loading-overlay.show{display:flex}
.loading-box{background:var(--bg2);border-radius:var(--radius);padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:260px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:slideIn .3s ease;font-size:13px}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}.toast.info{border-left:4px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--success)}.badge-yellow{background:rgba(245,158,11,.15);color:var(--warning)}.badge-red{background:rgba(239,68,68,.15);color:var(--danger)}.badge-blue{background:rgba(59,130,246,.15);color:var(--accent)}.badge-gray{background:var(--bg3);color:var(--text2)}
.chart-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar-label{width:160px;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-track{flex:1;background:var(--bg3);border-radius:4px;height:20px;position:relative;overflow:hidden}
.chart-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.chart-bar-fill span{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
.chart-bar-val{width:90px;text-align:right;font-size:12px;font-weight:600}
.progress-track{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}
.progress-fill.green{background:var(--success)}.progress-fill.yellow{background:var(--warning)}.progress-fill.red{background:var(--danger)}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.text-right{text-align:right}.text-center{text-align:center}.text-mono{font-family:monospace}
.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-warning{color:var(--warning)}
.flex-center{display:flex;align-items:center;justify-content:center}
.mb-16{margin-bottom:16px}.table-wrap{overflow-x:auto}
#sidebar.collapsed{width:56px;min-width:56px}
#sidebar.collapsed .nav-item span,#sidebar.collapsed .nav-section-title,#sidebar.collapsed .logo-text,#sidebar.collapsed .logo-sub{display:none}
@media(max-width:768px){#sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}#sidebar.mobile-open{transform:translateX(0)}#content{padding:16px}.form-row,.form-row-3{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
.info-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
</style>
</head>

</div>

// ============================================================
// API CLIENT — com fallback local e timeout
// ============================================================
async function apiCall(action, data={}, method='POST') {
  showLoading();
  try {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), _apiTimeout);
    
    let url = API_URL + '?action=' + encodeURIComponent(action);
    let opts = {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action, ...data}),
      signal: controller.signal
    };
    if (method === 'GET') {
      Object.keys(data).forEach(k => url += '&' + k + '=' + encodeURIComponent(data[k]));
      opts = {method:'GET', signal: controller.signal};
    }
    const res = await fetch(url, opts);
    clearTimeout(tid);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Erro desconhecido');
    return json.data;
  } catch(err) {
    if (err.name === 'AbortError') throw new Error('Timeout: o servidor demorou demais para responder.');
    throw err;
  } finally {
    hideLoading();
  }
}

// ============================================================
// LOADING / TOAST / MODAL
// ============================================================
let _loadingCount = 0;
function showLoading(msg='Aguarde...') {
  _loadingCount++;
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  _loadingCount = Math.max(0, _loadingCount - 1);
  if (_loadingCount === 0) document.getElementById('loading-overlay').classList.remove('show');
}
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icon = type==='success'?'✅':type==='error'?'❌':'ℹ️';
  el.innerHTML = icon + ' ' + msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 4500);
}
function openModal(title, html, footer='', large=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-footer').innerHTML = footer || '<button class="btn-outline btn-sm" onclick="closeModal()">Fechar</button>';
  document.getElementById('modal-box').className = 'modal' + (large?' modal-lg':'');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

function fmt(val) {
  const n = parseFloat(val||0);
  return 'R$ ' + n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function fmtNum(n) { return parseFloat(n||0).toLocaleString('pt-BR',{maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return '-'; return String(d).substring(0,10); }
function badge(status) {
  const m={'ATIVO':'green','INATIVO':'gray','OK':'green','ATENCAO':'yellow','CRITICO':'red','PENDENTE':'yellow','IMPORTADA':'blue','APROVADA':'green'};
  return `<span class="badge badge-${m[status]||'gray'}">${status||'-'}</span>`;
}
function setContent(html) { document.getElementById('content').innerHTML = html; }
function setTitle(t) { document.getElementById('page-title').textContent = t; }
function addTopbarBtn(label, cls, onclick) {
  const b = document.createElement('button');
  b.className = cls+' btn-sm'; b.textContent = label; b.onclick = onclick;
  document.getElementById('topbar-actions').appendChild(b);
}
function emptyState(msg) { return `<div class="empty-state"><div class="empty-icon">📭</div><p>${msg}</p></div>`; }
function renderBarChart(data, valKey, labelKey, color='blue') {
  if(!data||!data.length) return '';
  const max = Math.max(...data.map(d=>parseFloat(d[valKey]||0)),1);
  return data.map(d => {
    const pct = (parseFloat(d[valKey]||0)/max)*100;
    return `<div class="chart-bar-item">
      <div class="chart-bar-label" title="${d[labelKey]}">${d[labelKey]}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:var(--${color==='green'?'success':'accent'})">
        ${pct>20?'<span>'+fmt(d[valKey])+'</span>':''}
      </div></div>
      <div class="chart-bar-val">${fmt(d[valKey])}</div>
    </div>`;
  }).join('');
}

// ============================================================
// DADOS LOCAIS (cache dos pré-carregados + updates da API)
// ============================================================
let _localEscolas = [...DADOS_INICIAIS.escolas];
let _localMateriais = [...DADOS_INICIAIS.materiais];
let _localPlanos = [...DADOS_INICIAIS.planejamentos];
let _apiOk = false; // flag se a API respondeu
let _tentouCarga = false;

// Tenta enviar carga para a API em background (sem bloquear UI)
async function enviarCargaInicialAPI() {
  if (_tentouCarga) return;
  _tentouCarga = true;
  try {
    showLoading('Conectando ao servidor...');
    // Primeiro inicializa as abas
    await fetch(API_URL+'?action=sistema.init', {method:'GET', signal: AbortSignal.timeout(20000)});
    
    // Envia escolas
    for (const e of DADOS_INICIAIS.escolas) {
      await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'escola.create', ...e}),
        signal: AbortSignal.timeout(15000)
      });
    }
    // Envia materiais
    for (const m of DADOS_INICIAIS.materiais) {
      await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'material.create', ...m}),
        signal: AbortSignal.timeout(15000)
      });
    }
    // Envia planejamentos em lotes
    for (const p of DADOS_INICIAIS.planejamentos) {
      await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'planejamento.create', ...p}),
        signal: AbortSignal.timeout(15000)
      });
    }
    _apiOk = true;
    toast('Dados sincronizados com a planilha Google Sheets!', 'success');
  } catch(e) {
    toast('Modo offline: dados locais ativos. API indisponível.', 'info');
  } finally {
    hideLoading();
  }
}

// ============================================================
// WRAPPER: tenta API, cai para local
// ============================================================
async function getData(action, params={}) {
  try {
    const r = await apiCall(action, params, 'GET');
    return r;
  } catch(e) {
    // Usa dados locais como fallback
    return localFallback(action, params);
  }
}

async function postData(action, body={}) {
  try {
    const r = await apiCall(action, body);
    return r;
  } catch(e) {
    toast('Sem conexão com servidor. Operação salva localmente.', 'info');
    return localMutate(action, body);
  }
}

function localFallback(action, params) {
  const pg = parseInt(params.page||1), lim = parseInt(params.limit||200);
  const filter = (arr) => {
    let r = [...arr];
    Object.keys(params).forEach(k => {
      if(!['action','page','limit','q'].includes(k) && params[k])
        r = r.filter(x => String(x[k]||'').toLowerCase()===String(params[k]).toLowerCase());
    });
    if(params.q) { const q=params.q.toLowerCase(); r=r.filter(x=>Object.values(x).some(v=>String(v).toLowerCase().includes(q))); }
    return r;
  };
  const paginate = (arr) => { const t=arr.length,s=(pg-1)*lim; return {items:arr.slice(s,s+lim),total:t,page:pg,limit:lim,pages:Math.ceil(t/lim)}; };
  
  if(action==='escola.list')       return paginate(filter(_localEscolas));
  if(action==='escola.get')        return _localEscolas.find(x=>x.id===params.id)||null;
  if(action==='material.list')     return paginate(filter(_localMateriais));
  if(action==='material.get')      return _localMateriais.find(x=>x.id===params.id)||null;
  if(action==='planejamento.list') return paginate(filter(_localPlanos));
  if(action==='parceiro.list')     return {items:[],total:0,page:1,limit:lim,pages:0};
  if(action==='fornecedor.list')   return {items:[],total:0,page:1,limit:lim,pages:0};
  if(action==='nota.list')         return {items:[],total:0,page:1,limit:lim,pages:0};
  if(action==='estoque.central')   return {items:[],total:0};
  if(action==='estoque.parceiro')  return {items:[],total:0};
  if(action==='consumo.list')      return {items:[],total:0,page:1,limit:lim,pages:0};
  if(action==='movimentacao.list') return {items:[],total:0,page:1,limit:lim,pages:0};
  if(action==='financeiro.dashboard') return localDashboard();
  return {items:[],total:0};
}

function localDashboard() {
  const por_escola = _localEscolas.map(e=>{
    const ps = _localPlanos.filter(p=>p.escola_id===e.id);
    const prev = ps.reduce((s,p)=>s+parseFloat(p.quantidade_prevista||0)*parseFloat((_localMateriais.find(m=>m.id===p.material_id)||{}).valor_medio||0),0);
    return {escola_id:e.id,escola_nome:e.nome,gasto:0,previsto:prev,consumido:0,percentual:0,status:'OK'};
  }).filter(x=>x.previsto>0);
  const totalPrevisto = por_escola.reduce((s,x)=>s+x.previsto,0);
  return {
    gastoTotal:0,totalCompras:0,valorEstoque:0,saldoEstoque:0,
    totalEscolas:_localEscolas.length,totalNotas:0,totalPrevisto,
    gastoPorEscola:[],gastoPorMaterial:[],
    statusEscolas: por_escola.sort((a,b)=>b.previsto-a.previsto)
  };
}

function genId() { return Math.random().toString(36).substr(2,16).toUpperCase(); }
function localMutate(action, body) {
  const now = new Date().toISOString();
  if(action==='escola.create')   { const r={...body,id:genId(),created_at:now,updated_at:now}; _localEscolas.push(r); return r; }
  if(action==='escola.update')   { const i=_localEscolas.findIndex(x=>x.id===body.id); if(i>-1) _localEscolas[i]={..._localEscolas[i],...body}; return _localEscolas[i]; }
  if(action==='escola.delete')   { _localEscolas=_localEscolas.filter(x=>x.id!==body.id); return {deleted:true}; }
  if(action==='material.create') { const r={...body,id:genId(),created_at:now,updated_at:now}; _localMateriais.push(r); return r; }
  if(action==='material.update') { const i=_localMateriais.findIndex(x=>x.id===body.id); if(i>-1) _localMateriais[i]={..._localMateriais[i],...body}; return _localMateriais[i]; }
  if(action==='material.delete') { _localMateriais=_localMateriais.filter(x=>x.id!==body.id); return {deleted:true}; }
  if(action==='planejamento.create'){ const r={...body,id:genId(),created_at:now,updated_at:now}; _localPlanos.push(r); return r; }
  if(action==='planejamento.update'){ const i=_localPlanos.findIndex(x=>x.id===body.id); if(i>-1) _localPlanos[i]={..._localPlanos[i],...body}; return _localPlanos[i]; }
  if(action==='planejamento.delete'){ _localPlanos=_localPlanos.filter(x=>x.id!==body.id); return {deleted:true}; }
  return {ok:true};
}

async function verEscolaPlano(escolaId) {
  const escola = _localEscolas.find(e=>e.id===escolaId);
  if (!escola) return;
  const planos = _localPlanos.filter(p=>p.escola_id===escolaId);
  const totalPrev = planos.reduce((s,p)=>{
    const mat = _localMateriais.find(m=>m.id===p.material_id);
    return s + parseFloat(p.quantidade_prevista||0)*parseFloat((mat||{}).valor_medio||0);
  },0);
  const rows = planos.map(p=>{
    const mat=_localMateriais.find(m=>m.id===p.material_id)||{};
    const custo=parseFloat(p.quantidade_prevista||0)*parseFloat(mat.valor_medio||0);
    return `<tr><td>${p.material_nome}</td><td class="text-right">${fmtNum(p.quantidade_prevista)}</td><td class="text-right">${fmt(mat.valor_medio||0)}</td><td class="text-right"><strong>${fmt(custo)}</strong></td></tr>`;
  }).join('');
  openModal(`📊 Planejamento: ${escola.nome}`,
    `<div style="display:flex;gap:16px;margin-bottom:16px">
      <div class="stat-card" style="flex:1;padding:12px"><div class="stat-label">Previsão Total</div><div class="stat-value" style="font-size:18px">${fmt(totalPrev)}</div></div>
      <div class="stat-card" style="flex:1;padding:12px"><div class="stat-label">Qtd Materiais</div><div class="stat-value" style="font-size:18px">${planos.length}</div></div>
      <div class="stat-card" style="flex:1;padding:12px"><div class="stat-label">APs</div><div class="stat-value" style="font-size:18px">${parseInt(escola.kit_wifi||0)+parseInt(escola.ap_adicional||0)}</div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Material</th><th class="text-right">Qtd Prevista</th><th class="text-right">Vlr Unit</th><th class="text-right">Custo Prev.</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4">Sem planejamento</td></tr>'}</tbody>
      <tfoot><tr style="font-weight:700"><td colspan="3">Total Previsto</td><td class="text-right">${fmt(totalPrev)}</td></tr></tfoot>
    </table></div>`,
    `<button class="btn-outline btn-sm" onclick="closeModal()">Fechar</button>`, true);
}

function addItemNF(mOpts) {
  if(!window._notaItens) window._notaItens=[];
  window._notaItens.push({material_id:'',material_nome:'',quantidade:0,valor_unitario:0});
  renderItensNF(mOpts);
}

function renderItensNF(mOpts) {
  const list=document.getElementById('itens-nf');
  if(!list) return;
  if(!window._notaItens||!window._notaItens.length){list.innerHTML='<p style="color:var(--text3);font-size:12px;text-align:center;padding:16px">Sem itens</p>';return;}
  list.innerHTML=window._notaItens.map((it,i)=>`
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;padding:10px;background:var(--bg3);border-radius:6px">
      <div><label>Material</label><select onchange="updItemNF(${i},'material_id',this.value,this)" id="in-m-${i}">
        <option value="">Selecione...</option>${mOpts}
      </select></div>
      <div><label>Qtd</label><input type="number" step="0.001" value="${it.quantidade}" oninput="updItemNF(${i},'quantidade',this.value)"></div>
      <div><label>Vlr Unit</label><input type="number" step="0.01" value="${it.valor_unitario}" oninput="updItemNF(${i},'valor_unitario',this.value)"></div>
      <div><button class="btn-danger btn-sm" onclick="remItemNF(${i},'${mOpts.replace(/'/g,"\\'")}') ">✕</button></div>
    </div>`).join('');
  calcNFTotal();
}

function updItemNF(i,field,val,el) {
  if(!window._notaItens) return;
  if(field==='material_id'&&el){const o=el.options[el.selectedIndex];window._notaItens[i].material_nome=o?o.getAttribute('data-nome')||'':'';}
  window._notaItens[i][field]=val; calcNFTotal();
}
function remItemNF(i,mOpts){ window._notaItens.splice(i,1); renderItensNF(mOpts); }
function calcNFTotal(){ const t=(window._notaItens||[]).reduce((s,i)=>s+parseFloat(i.quantidade||0)*parseFloat(i.valor_unitario||0),0); const el=document.getElementById('nf-total'); if(el) el.textContent=fmt(t); }

async function saveNota() {
  const fornEl=document.getElementById('fn-forn');

  const itens=(window._notaItens||[]).map(i=>({...i,quantidade:parseFloat(i.quantidade||0),valor_unitario:parseFloat(i.valor_unitario||0),valor_total:parseFloat(i.quantidade||0)*parseFloat(i.valor_unitario||0)}));
  try{
    await apiCall('nota.create',{numero_nota:num,fornecedor_id:fornEl.value,fornecedor_nome:fornEl.options[fornEl.selectedIndex]?.getAttribute('data-nome')||'',data_emissao:document.getElementById('fn-dt').value,valor_total:itens.reduce((s,i)=>s+i.valor_total,0),itens});

let _planoFiltroEscola='', _planoFiltroMat='';

function renderPlanos() {
  let planos=[..._localPlanos];
  if(_planoFiltroEscola) planos=planos.filter(p=>p.escola_id===_planoFiltroEscola);
  if(_planoFiltroMat)    planos=planos.filter(p=>p.material_id===_planoFiltroMat);

  const escOpts=_localEscolas.map(e=>`<option value="${e.id}" ${e.id===_planoFiltroEscola?'selected':''}>${e.nome}</option>`).join('');
  const matOpts=_localMateriais.map(m=>`<option value="${m.id}" ${m.id===_planoFiltroMat?'selected':''}>${m.nome}</option>`).join('');

  const rows=planos.slice(0,200).map(p=>{
    const mat=_localMateriais.find(m=>m.id===p.material_id)||{};
    const prev=parseFloat(p.quantidade_prevista||0), cons=parseFloat(p.quantidade_consumida||0);
    const pct=prev>0?Math.min(Math.round((cons/prev)*100),100):0;
    const custo=prev*parseFloat(mat.valor_medio||0);
    const cor=p.status==='CRITICO'?'red':p.status==='ATENCAO'?'yellow':'green';
    return `<tr>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.escola_nome}</td>
      <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.material_nome}</td>
      <td class="text-right">${fmtNum(prev)}</td>
      <td class="text-right">${fmt(custo)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-track" style="flex:1"><div class="progress-fill ${cor}" style="width:${pct}%"></div></div>
          <span style="font-size:11px;width:30px">${pct}%</span>
        </div>
      </td>
      <td>${badge(p.status)}</td>
      <td class="text-right">
        <button class="btn-danger btn-sm" onclick="deletePlano('${p.id}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');

  const totalPrev=planos.reduce((s,p)=>{const mat=_localMateriais.find(m=>m.id===p.material_id)||{};return s+parseFloat(p.quantidade_prevista||0)*parseFloat(mat.valor_medio||0);},0);

  setContent(`
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-body" style="display:flex;gap:12px;align-items:center">
        <div style="flex:1"><label>Filtrar por Escola</label>
          <select onchange="_planoFiltroEscola=this.value;renderPlanos()">
            <option value="">Todas as escolas</option>${escOpts}
          </select>
        </div>
        <div style="flex:1"><label>Filtrar por Material</label>
          <select onchange="_planoFiltroMat=this.value;renderPlanos()">
            <option value="">Todos os materiais</option>${matOpts}
          </select>
        </div>
        <div class="stat-card" style="padding:10px 16px;flex-shrink:0">
          <div class="stat-label">Previsão Filtrada</div>
          <div style="font-size:16px;font-weight:700">${fmt(totalPrev)}</div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📅 Planejamento (${planos.length} itens)</span>
        <span style="font-size:12px;color:var(--text3)">Mostrando até 200</span>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Escola</th><th>Material</th><th class="text-right">Qtd Prev.</th><th class="text-right">Custo Prev.</th><th>Progresso</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7">'+emptyState('Nenhum planejamento')+'</td></tr>'}</tbody>
      </table></div>
    </div>`);
}

async function formPlano() {
  const eOpts=_localEscolas.map(e=>`<option value="${e.id}" data-nome="${e.nome}">${e.nome}</option>`).join('');
  const mOpts=_localMateriais.map(m=>`<option value="${m.id}" data-nome="${m.nome}">${m.nome}</option>`).join('');
  openModal('Novo Planejamento',`
    <div class="form-group"><label>Escola *</label><select id="pl-esc"><option value="">Selecione...</option>${eOpts}</select></div>
    <div class="form-group"><label>Material *</label><select id="pl-mat"><option value="">Selecione...</option>${mOpts}</select></div>
    <div class="form-group"><label>Quantidade Prevista *</label><input id="pl-qtd" type="number" step="0.001" value="0"></div>`,
    `<button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn-primary btn-sm" onclick="savePlano()">💾 Salvar</button>`);
}

async function savePlano() {
  const eEl=document.getElementById('pl-esc'),mEl=document.getElementById('pl-mat');
  const payload={escola_id:eEl.value,escola_nome:eEl.options[eEl.selectedIndex]?.getAttribute('data-nome')||'',material_id:mEl.value,material_nome:mEl.options[mEl.selectedIndex]?.getAttribute('data-nome')||'',quantidade_prevista:parseFloat(document.getElementById('pl-qtd').value)||0,quantidade_consumida:0,status:'OK'};
  if(!payload.escola_id||!payload.material_id) return toast('Escola e Material obrigatórios','error');
  await postData('planejamento.create',payload);
  toast('Planejamento salvo!','success'); closeModal(); renderPlanos();
}

async function deletePlano(id) {
  if(!confirm('Excluir planejamento?')) return;
  await postData('planejamento.delete',{id});
  toast('Excluído!','success'); renderPlanos();
}

// ============================================================
// FINANCEIRO
// ============================================================
pageHandlers['financeiro'] = async () => {
  setTitle('Relatório Financeiro');
  setContent('<div class="flex-center" style="height:200px"><div class="spinner"></div></div>');
  
  // Sempre calcula previsão localmente (não depende da API)
  const totalPrevisto=_localPlanos.reduce((s,p)=>{
    const mat=_localMateriais.find(m=>m.id===p.material_id)||{};
    return s+parseFloat(p.quantidade_prevista||0)*parseFloat(mat.valor_medio||0);
  },0);

  // Agrupa por escola
  const porEscola={};
  _localEscolas.forEach(e=>{
    const ps=_localPlanos.filter(p=>p.escola_id===e.id);
    const prev=ps.reduce((s,p)=>{const mat=_localMateriais.find(m=>m.id===p.material_id)||{};return s+parseFloat(p.quantidade_prevista||0)*parseFloat(mat.valor_medio||0);},0);
    if(prev>0) porEscola[e.id]={nome:e.nome,previsto:prev,gasto:0,percentual:0,status:'OK',n_aps:parseInt(e.kit_wifi||0)+parseInt(e.ap_adicional||0)};
  });

  // Tenta pegar gastos reais da API
  let gastoReal=0, totalNotas=0;
  try{
    const d=await apiCall('financeiro.dashboard',{});
    gastoReal=d.gastoTotal||0; totalNotas=d.totalNotas||0;
    (d.gastoPorEscola||[]).forEach(x=>{if(porEscola[x.escola_id]){porEscola[x.escola_id].gasto=x.valor;porEscola[x.escola_id].percentual=porEscola[x.escola_id].previsto>0?Math.round(x.valor/porEscola[x.escola_id].previsto*100):0;}});
  }catch(e){}

  const escList=Object.values(porEscola).sort((a,b)=>b.previsto-a.previsto);
  const escRows=escList.map(e=>{
    const pct=Math.min(e.percentual,100);
    const cor=pct>=100?'red':pct>=80?'yellow':'green';
    return `<tr>
      <td><strong>${e.nome}</strong></td>
      <td class="text-center"><span class="info-chip">📡 ${e.n_aps} APs</span></td>
      <td class="text-right">${fmt(e.previsto)}</td>
      <td class="text-right ${e.gasto>0?'text-danger':''}">${fmt(e.gasto)}</td>
      <td class="text-right ${e.previsto-e.gasto>=0?'text-success':'text-danger'}">${fmt(e.previsto-e.gasto)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-track" style="flex:1"><div class="progress-fill ${cor}" style="width:${pct}%"></div></div>
          <span style="font-size:11px">${e.percentual}%</span>
        </div>
      </td>
      <td>${badge(e.percentual>=100?'CRITICO':e.percentual>=80?'ATENCAO':'OK')}</td>
    </tr>`;
  }).join('');

  // Top 10 materiais por custo previsto
  const porMat={};
  _localPlanos.forEach(p=>{
    const mat=_localMateriais.find(m=>m.id===p.material_id)||{};
    const custo=parseFloat(p.quantidade_prevista||0)*parseFloat(mat.valor_medio||0);
    if(!porMat[p.material_id]) porMat[p.material_id]={nome:p.material_nome,valor:0};
    porMat[p.material_id].valor+=custo;
  });
  const matTop=Object.values(porMat).sort((a,b)=>b.valor-a.valor).slice(0,10);

  setContent(`
    <div class="stats-grid">
      <div class="stat-card yellow"><div class="stat-label">Previsão Total</div><div class="stat-value" style="font-size:18px">${fmt(totalPrevisto)}</div><div class="stat-sub">Baseado nos APs planejados</div></div>
      <div class="stat-card red"><div class="stat-label">Gasto Real</div><div class="stat-value" style="font-size:18px">${fmt(gastoReal)}</div><div class="stat-sub">Consumo registrado</div></div>
      <div class="stat-card green"><div class="stat-label">Saldo</div><div class="stat-value" style="font-size:18px">${fmt(totalPrevisto-gastoReal)}</div><div class="stat-sub">Previsto - Real</div></div>
      <div class="stat-card"><div class="stat-label">Escolas</div><div class="stat-value">${_localEscolas.length}</div></div>
      <div class="stat-card"><div class="stat-label">Notas Lançadas</div><div class="stat-value">${totalNotas}</div></div>
      <div class="stat-card"><div class="stat-label">Itens Planejamento</div><div class="stat-value">${_localPlanos.length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📦 Top Materiais (Custo Prev.)</span></div>
        <div class="panel-body">${renderBarChart(matTop,'valor','nome','green')}</div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📊 % Previsto por Escola</span></div>
        <div class="panel-body">${renderBarChart(escList.slice(0,8).map(e=>({nome:e.nome,valor:e.previsto})),'valor','nome')}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">💰 Previsto vs Real por Escola</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Escola</th><th>APs</th><th class="text-right">Previsto</th><th class="text-right">Gasto Real</th><th class="text-right">Saldo</th><th>Progresso</th><th>Status</th></tr></thead>
        <tbody>${escRows||'<tr><td colspan="7">'+emptyState('Sem dados')+'</td></tr>'}</tbody>
      </table></div>
    </div>`);
};

// ============================================================
// MAPA ESCOLAS
// ============================================================
pageHandlers['mapa'] = () => {
  setTitle('Mapa das Escolas');
  const escolas = _localEscolas.filter(e=>e.latitude&&e.longitude);
  const markers = escolas.map(e=>({
    lat: parseFloat(e.latitude), lng: parseFloat(e.longitude),
    title: e.nome, info: `<strong>${e.nome}</strong><br>${e.endereco||''}<br>APs: ${parseInt(e.kit_wifi||0)+parseInt(e.ap_adicional||0)}`
  }));

  if (!escolas.length) { setContent(emptyState('Nenhuma escola com coordenadas')); return; }

  // Usa leaflet OSM gratuito
  setContent(`
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🗺️ Escolas (${escolas.length} com localização)</span>
        <span style="font-size:11px;color:var(--text3)">Clique nos marcadores para detalhes</span>
      </div>
      <div id="map" style="height:500px;border-radius:0 0 10px 10px"></div>
    </div>`);

  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  document.head.appendChild(script);

  const css = document.createElement('link');
  css.rel='stylesheet'; css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(css);

  script.onload = () => {
    const map = L.map('map').setView([-22.9, -43.4], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    markers.forEach(m=>{
      L.marker([m.lat,m.lng]).addTo(map).bindPopup(m.info);
    });
  };
};

// ============================================================
// PAGINATION HELPER
// ============================================================
function paginationHtml(data, fnName) {
  if(!data||data.pages<=1) return '';
  let html='<div style="display:flex;gap:6px;justify-content:center;margin-top:16px">';
  for(let i=1;i<=Math.min(data.pages,10);i++){
    const active=i===data.page?'style="background:var(--accent);color:#fff"':'';
    html+=`<button class="btn-outline btn-sm" ${active} onclick="${fnName}(${i})">${i}</button>`;
  }
  html+='</div>';
  return html;
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Navega imediatamente para o dashboard com dados locais
  navigate('dashboard');
  
  // Em background, tenta conectar à API e enviar a carga
  // (não bloqueia a UI)
  setTimeout(async () => {
    try {
      showLoading('Conectando ao servidor Google Sheets...');
      const r = await fetch(API_URL+'?action=sistema.init', {
        method:'GET', signal: AbortSignal.timeout(20000)
      });
      const json = await r.json();
      if(json.success) {
        _apiOk = true;
        toast('✅ Conectado ao Google Sheets!', 'success');
        // Não reenvia a carga automaticamente para não duplicar dados
        // O usuário pode usar o botão de sincronização
      }
    } catch(e) {
      toast('⚠️ Rodando em modo offline (dados locais)', 'info');
    } finally {
      hideLoading();
    }
  }, 500);
}

// Botão de sincronizar dados
async function sincronizarDados() {
  if(!confirm(`Isso enviará ${_localEscolas.length} escolas, ${_localMateriais.length} materiais e ${_localPlanos.length} planejamentos para o Google Sheets.\n\nOPERAÇÃO DEMORADA (~5-10 min). Continuar?`)) return;
  
  let ok=0, erros=0;
  showLoading('Sincronizando escolas...');
  
  try {
    await fetch(API_URL+'?action=sistema.init',{method:'GET',signal:AbortSignal.timeout(20000)});
    
    for(const e of _localEscolas) {
      try{
        await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'escola.create',...e}),signal:AbortSignal.timeout(15000)});
        ok++;
      }catch(er){erros++;}
    }
    document.getElementById('loading-text').textContent='Sincronizando materiais...';
    for(const m of _localMateriais) {
      try{
        await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'material.create',...m}),signal:AbortSignal.timeout(15000)});
        ok++;
      }catch(er){erros++;}
    }
    document.getElementById('loading-text').textContent='Sincronizando planejamentos...';
    for(const p of _localPlanos) {
      try{
        await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'planejamento.create',...p}),signal:AbortSignal.timeout(15000)});
        ok++;
      }catch(er){erros++;}
    }
    toast(`Sincronização concluída! ${ok} registros. ${erros} erros.`, erros?'info':'success');
  } catch(e) {
    toast('Erro na sincronização: '+e.message,'error');
  } finally {
    hideLoading();
  }
}

// Adiciona botão de sync no sidebar footer
document.getElementById('sidebar-footer').innerHTML += `
  <button class="btn-outline btn-sm" onclick="sincronizarDados()" title="Sincronizar com Google Sheets">☁️</button>
`;

init();
</script>
